<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>천안IPC 주간업무현황 v2.4</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown@7/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1/dist/turndown-plugin-gfm.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#F5F4F0;--bg2:#fff;--bg3:#EEECEA;
  --bd:#E0DED8;--bd2:#CECCCA;
  --tx:#1C1C1A;--tx2:#5A5955;--tx3:#99978F;
  --blue:#1A5FA8;--blue-bg:#EAF1FB;--blue-tx:#0B3F7A;
  --green:#3A6E12;--green-bg:#EBF3DE;--green-tx:#254A09;
  --amber:#8A5009;--amber-bg:#FBF0DC;--amber-tx:#5E3504;
  --red:#A82B2B;--red-bg:#FCEAEA;--red-tx:#7A1C1C;
  --purple:#4E45B0;--purple-bg:#EEEDFE;--purple-tx:#332E84;
  --teal:#0C6B52;--teal-bg:#E0F4EE;--teal-tx:#084835;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6}

/* ── 로그인 ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:32px 36px;width:400px;max-width:95vw}
.login-logo{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.login-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px;letter-spacing:-.02em}
.login-sub{font-size:12px;color:var(--tx2);margin-bottom:22px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.fi{width:100%;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--tx);background:var(--bg2)}
.fi:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.login-btn:hover{background:var(--blue-tx)}
.login-btn:disabled{opacity:.6;cursor:default}
.login-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px}
.login-demo{font-size:11px;color:var(--blue);margin-top:12px;text-align:center;cursor:pointer}
.login-demo:hover{text-decoration:underline}
.login-ver{font-size:10px;color:var(--tx3);text-align:center;margin-top:14px}

/* ── 상단바 ── */
#app{display:none}
.topbar{
  height:50px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:grid;
  grid-template-columns:auto 1fr auto;  /* brand | nav | right */
  align-items:center;
  padding:0 16px;gap:0;
  position:sticky;top:0;z-index:200;
}
.tb-brand{display:flex;flex-direction:column;padding-right:14px;border-right:1px solid var(--bd);margin-right:0;flex-shrink:0}
.tb-brand .co{font-size:10px;color:var(--tx3)}
.tb-brand .nm{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap}
.tb-nav{display:flex;align-items:center;gap:0;padding-left:4px;overflow:hidden}
.tb-link{font-size:12px;color:var(--tx2);padding:0 12px;height:50px;display:flex;align-items:center;gap:5px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tb-link i{font-size:14px}
.tb-link.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tb-link:hover:not(.active){background:var(--bg3)}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-left:8px}
.week-nav{display:flex;align-items:center;gap:3px}
.wn-btn{width:22px;height:22px;border:1px solid var(--bd);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2)}
.wn-btn:hover{background:var(--bg3)}
.wn-btn i{font-size:11px}
.wn-lbl{font-size:11px;font-weight:700;color:var(--tx);background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:2px 10px;min-width:128px;text-align:center;white-space:nowrap;display:flex;align-items:center;gap:5px;justify-content:center;cursor:pointer;transition:background .15s}
.wn-lbl:hover{background:var(--blue-bg);color:var(--blue-tx)}
.wn-lbl .wn-date{font-size:10px;font-weight:500;color:var(--tx2)}
.user-chip{font-size:11px;background:var(--blue-bg);color:var(--blue-tx);border-radius:99px;padding:3px 10px;display:flex;align-items:center;gap:3px;font-weight:700;white-space:nowrap}
.user-chip i{font-size:12px}
.icon-btn{width:26px;height:26px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2);flex-shrink:0}
.icon-btn:hover{background:var(--bg3)}
.icon-btn i{font-size:13px}
.ver-chip{font-size:10px;color:var(--tx3);white-space:nowrap}

/* ── 서브바 ── */
.subbar{height:40px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:5px;position:sticky;top:50px;z-index:199;overflow-x:auto}
.sb-lbl{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-right:2px;flex-shrink:0}
.chip{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;flex-shrink:0}
.chip.on-all{background:var(--tx);color:var(--bg2);border-color:transparent}
.chip.on-3,.chip.on-4{background:var(--amber-bg);color:var(--amber-tx);border-color:transparent}
.chip.on-5,.chip.on-6{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.chip.on-inf{background:var(--teal-bg);color:var(--teal-tx);border-color:transparent}
.chip.on-dx{background:var(--purple-bg);color:var(--purple-tx);border-color:transparent}

/* ── 뷰 ── */
.view{display:none}.view.active{display:flex;flex-direction:column}

/* ── 롤업 ── */
.rollup{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.site-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.site-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s}
.site-head:hover,.site-head.exp{background:var(--bg3)}
.s-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}
.t-blue{background:var(--blue-bg);color:var(--blue-tx)}
.t-amber{background:var(--amber-bg);color:var(--amber-tx)}
.t-teal{background:var(--teal-bg);color:var(--teal-tx)}
.t-purple{background:var(--purple-bg);color:var(--purple-tx)}
.s-name{font-size:14px;font-weight:700;color:var(--tx);min-width:55px}
.s-type{font-size:11px;color:var(--tx3)}
.s-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-bar{width:64px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:11px;color:var(--tx2);min-width:34px;text-align:right;font-weight:700}
.s-status{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.st-ok{background:var(--green-bg);color:var(--green-tx)}
.st-warn{background:var(--amber-bg);color:var(--amber-tx)}
.st-red{background:var(--red-bg);color:var(--red-tx)}
.open-btn{width:24px;height:24px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2);transition:all .15s;flex-shrink:0}
.open-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.open-btn i{font-size:12px}
.inline-body{display:none;border-top:1px solid var(--bd)}
.inline-body.open{display:grid;grid-template-columns:1fr 1fr}
.icol{padding:10px 14px;border-right:1px solid var(--bd)}
.icol:last-child{border-right:none}
.icol-hd{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.icol-hd i{font-size:12px}
.tl{display:flex;align-items:flex-start;gap:5px;margin-bottom:4px}
.tld{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d-done{background:#3A6E12}.d-prog{background:#1A5FA8}
.d-plan{background:#8A5009}.d-warn{background:#A82B2B}
.tlt{font-size:11px;color:var(--tx2);line-height:1.45;flex:1}
.tlt.done{color:var(--tx3);text-decoration:line-through}
.more-link{font-size:11px;color:var(--blue);margin-top:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

/* ── 상세 뷰 (WYSIWYG) ── */
.dv{height:calc(100vh - 90px);overflow:hidden;display:flex;flex-direction:column}
.dv-bar{height:44px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:6px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.back-btn:hover{background:var(--bg3)}
.back-btn i{font-size:13px}
.crumb{font-size:12px;color:var(--tx3)}
.crumb strong{color:var(--tx);font-weight:700}
.dv-bar-r{margin-left:auto;display:flex;gap:5px;align-items:center}
.gj-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0;overflow-x:auto;padding:0 16px}
.gj-tab{font-size:12px;padding:8px 12px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.gj-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.gj-tab:hover:not(.active){background:var(--bg3)}
.gj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gj-tab-edit{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0;color:var(--tx3);margin-left:2px;flex-shrink:0}
.gj-tab-edit i{font-size:10px}
.gj-tab:hover .gj-tab-edit{opacity:.7}
.gj-tab-edit:hover{opacity:1!important;background:var(--bg3);color:var(--tx)}
.gj-tab-add{color:var(--blue)!important;border-bottom-color:transparent!important;gap:4px}
.gj-tab-add:hover{background:var(--blue-bg)!important}
.gj-tab-add i{font-size:13px}

/* ── WYSIWYG 에디터 ── */
.wy-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;border-top:1px solid var(--bd)}
.wy-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.wy-pane:first-child{border-right:1px solid var(--bd)}
.wy-pane-hd{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--bd);background:var(--bg3);flex-shrink:0}
.wy-pane-hd h4{font-size:11px;font-weight:700;color:var(--tx2);display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.04em}
.wy-pane-hd h4 i{font-size:12px}
.wy-badge{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:600}
.wyb-cur{background:var(--blue-bg);color:var(--blue-tx)}
.wyb-nxt{background:var(--green-bg);color:var(--green-tx)}

/* 툴바 */
.wy-toolbar{display:flex;align-items:center;gap:1px;padding:4px 8px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-wrap:wrap;flex-shrink:0}
.wt{min-width:24px;height:24px;border:0.5px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--tx2);background:var(--bg2);padding:0 4px;user-select:none;white-space:nowrap;transition:all .1s;flex-shrink:0}
.wt:hover{background:var(--bg3);color:var(--tx);border-color:var(--bd2)}
.wt.on{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.wtsep{width:0.5px;height:14px;background:var(--bd);margin:0 2px;flex-shrink:0}
.wtlbl{font-size:10px;color:var(--tx3);padding:0 2px;flex-shrink:0}

/* contenteditable 영역 */
.wy-ce{flex:1;outline:none;padding:14px 16px;overflow-y:auto;font-size:13px;line-height:1.75;color:var(--tx);caret-color:var(--blue)}
.wy-ce:empty::before{content:attr(data-ph);color:var(--tx3);font-size:12px;pointer-events:none}
.wy-ce h3{font-size:14px;font-weight:600;color:var(--tx);margin:12px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.wy-ce h3:first-child{margin-top:0}
.wy-ce h4{font-size:13px;font-weight:600;color:var(--tx);margin:8px 0 3px}
.wy-ce p{color:var(--tx2);font-size:12px;margin:2px 0;min-height:20px}
.wy-ce p:empty::before{content:'여기에 입력...';color:var(--tx3);font-size:11px}
.wy-ce ul,.wy-ce ol{margin:2px 0 2px 18px}
.wy-ce li{color:var(--tx2);font-size:12px;margin-bottom:3px;line-height:1.6}
.wy-ce li input[type=checkbox]{margin-right:5px;accent-color:var(--blue);cursor:pointer}
.wy-ce blockquote{border-left:3px solid var(--bd2);padding:3px 10px;margin:5px 0;color:var(--tx3);background:var(--bg3);border-radius:0 4px 4px 0;font-size:11px}
.wy-ce code{font-family:'SF Mono','Fira Code',monospace;font-size:10px;background:var(--bg3);padding:1px 5px;border-radius:3px;border:0.5px solid var(--bd)}
.wy-ce pre{background:var(--bg3);padding:10px 12px;border-radius:var(--r);margin:5px 0;overflow-x:auto}
.wy-ce pre code{background:none;border:none;font-size:11px}
.wy-ce strong{font-weight:600;color:var(--tx)}
.wy-ce em{font-style:italic}
.wy-ce hr{border:none;border-top:0.5px solid var(--bd);margin:10px 0}
.wy-ce table{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}
.wy-ce th{background:var(--bg3);padding:4px 8px;border:1px solid var(--bd);font-weight:700;color:var(--tx);text-align:left}
.wy-ce td{padding:4px 8px;border:1px solid var(--bd);color:var(--tx2)}

/* 상태 배지 */
.wy-ce .bd,.bd{background:#EBF3DE;color:#254A09;font-size:10px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .bp,.bp{background:#EAF1FB;color:#0B3F7A;font-size:10px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .by,.by{background:#FBF0DC;color:#5E3504;font-size:10px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .bw,.bw{background:#FCEAEA;color:#7A1C1C;font-size:10px;padding:1px 6px;border-radius:99px;font-family:inherit}

/* /명령어 팝업 */
.slash-pop{position:absolute;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r2);padding:5px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:300;min-width:210px;display:none;max-height:300px;overflow-y:auto}
.si{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:var(--r);font-size:12px;color:var(--tx2)}
.si:hover,.si.sel{background:var(--blue-bg);color:var(--blue-tx)}
.si i{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.si .sh{font-size:10px;margin-left:auto;opacity:.6}
.si:hover .sh,.si.sel .sh{opacity:1}
.slash-cat{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px 3px;margin-top:4px}
.slash-cat:first-child{margin-top:0}

/* 상태바 */
.wy-sbar{height:28px;background:var(--bg3);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.ws-item{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:3px}
.ws-item i{font-size:11px}
.save-area{margin-left:auto;display:flex;align-items:center;gap:6px}
.save-btn{font-size:11px;padding:4px 12px;border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2);display:flex;align-items:center;gap:4px;font-weight:700;transition:all .15s}
.save-btn:hover{background:var(--blue);color:#fff;border-color:transparent}
.save-btn.saving{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent;pointer-events:none}
.save-btn.saved{background:var(--green-bg);color:var(--green-tx);border-color:transparent}

/* ── 캘린더 ── */
.cal-hdr{height:44px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.cal-title{font-size:14px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px}
.cal-nav{width:26px;height:26px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.cal-nav:hover{background:var(--bg3)}
.cal-nav i{font-size:12px}
.cal-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cal-leg{display:flex;align-items:center;gap:8px}
.leg{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--tx2)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.add-ev-btn{font-size:11px;padding:4px 10px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500;transition:all .15s}
.add-ev-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.add-ev-btn i{font-size:12px}
.cal-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cal-dow{background:var(--bg3);text-align:center;font-size:10px;font-weight:700;color:var(--tx3);padding:6px 0;letter-spacing:.04em}
.cal-dow.sun{color:var(--red)}.cal-dow.sat{color:var(--blue)}
.cal-cell{background:var(--bg2);min-height:72px;padding:4px 5px;cursor:pointer}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.today{background:var(--blue-bg)}
.cal-cell.other .cal-dn{opacity:.3}
.cal-dn{font-size:11px;font-weight:700;color:var(--tx);margin-bottom:2px}
.cal-dn.sun{color:var(--red)}.cal-dn.sat{color:var(--blue)}
.cal-ev{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}
.ev-ext{background:var(--red-bg);color:var(--red-tx)}
.ev-int{background:var(--blue-bg);color:var(--blue-tx)}
.ev-dx{background:var(--purple-bg);color:var(--purple-tx)}
.ev-site{background:var(--teal-bg);color:var(--teal-tx)}
.ev-more{font-size:10px;color:var(--tx3);padding:1px 4px}
.ev-lhdr{display:flex;align-items:center;justify-content:space-between}
.ev-lhdr span{font-size:13px;font-weight:700;color:var(--tx)}
.ev-list{display:flex;flex-direction:column;gap:4px}
.ev-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg2)}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ev-date{font-size:11px;color:var(--tx3);width:38px;flex-shrink:0;font-weight:600}

<script>
// ════════════════════════════════════════════════════════════
// 버전 정보
// ════════════════════════════════════════════════════════════
const VER = 'v2.4  2025-06-11 23:55  (Firebase 실시간 동기화)';
document.getElementById('login-ver').textContent = '버전 ' + VER;

// ════════════════════════════════════════════════════════════
// 토큰 (내장 — 코드에 직접 포함)
// ════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════
// Firebase 초기화 (실시간 DB — 데이터·토큰 모두 여기 저장)
// ════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBycY7e2rCAGNbhNBPEZztsTavN18yqts0",
  authDomain: "ipc-dashboard-61be5.firebaseapp.com",
  databaseURL: "https://ipc-dashboard-61be5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ipc-dashboard-61be5",
  storageBucket: "ipc-dashboard-61be5.firebasestorage.app",
  messagingSenderId: "761608237774",
  appId: "1:761608237774:web:769a3938a7ae90e80cd69f",
  measurementId: "G-QD8017ERGY"
};
firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
const FB_ROOT = 'ipark_weekly_v1';

// ════════════════════════════════════════════════════════════
// 상수
// ════════════════════════════════════════════════════════════
const SITES = ['3단지','4단지','5단지','6단지','기반시설','DX TFT'];
const SITE_TYPE = {'3단지':'착공예정','4단지':'착공예정','5단지':'착공','6단지':'착공','기반시설':'기반시설','DX TFT':'DX TFT'};
const CATS = {
  '착공':     ['토목','건축','전기','설비','조경','공무','RM'],
  '착공예정': ['건축허가','환경·교통','인허가협의','설계검토','기타'],
  '기반시설': ['토목','전기','통신','조경','공무'],
  'DX TFT':  ['현장 DX 적용','본사 유관팀 협의','DX 교육·과제']
};
const GJ_COL = {
  토목:'#3D5A78',건축:'#1A5FA8',전기:'#8A5009',설비:'#0C6B52',
  조경:'#3A6E12',공무:'#4E45B0',RM:'#9B2E5C',
  건축허가:'#1A5FA8','환경·교통':'#0C6B52',인허가협의:'#4E45B0',설계검토:'#8A5009',기타:'#3D5A78',
  전기:'#8A5009',통신:'#4E45B0',
  '현장 DX 적용':'#1A5FA8','본사 유관팀 협의':'#4E45B0','DX 교육·과제':'#3A6E12'
};
const PROG_COL = {'착공':'#1A5FA8','착공예정':'#8A5009','기반시설':'#0C6B52','DX TFT':'#4E45B0'};

// ════════════════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════════════════
let IS_DEMO = false;
let curUser = null;
let curSite = '', curGJ = '';
let calYear = 2025, calMonth = 5;
let calEvents = [];
let dataCache = {}, etagCache = {};
function calcWeek(baseDate){
  const d=new Date(baseDate);
  const yr=d.getFullYear();
  const jan1=new Date(yr,0,1);
  const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1); // 월요일
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);        // 금요일
  return{year:yr,week:wk,label:`${wk}주차`,
         from:mon.toISOString().slice(0,10),
         to:fri.toISOString().slice(0,10)};
}
let WEEK = calcWeek(new Date());

// ════════════════════════════════════════════════════════════
// marked + turndown 설정
// ════════════════════════════════════════════════════════════
const mRdr = new marked.Renderer();
const _cs = mRdr.codespan.bind(mRdr);
mRdr.codespan = c => {
  if(c==='완료') return '<span class="bd">완료</span>';
  if(c==='진행') return '<span class="bp">진행</span>';
  if(c==='예정') return '<span class="by">예정</span>';
  if(c==='지적'||c==='대기') return '<span class="bw">'+c+'</span>';
  return _cs(c);
};
marked.use({renderer:mRdr,breaks:true,gfm:true});

// turndown: HTML → markdown
const td = new TurndownService({headingStyle:'atx',bulletListMarker:'-',codeBlockStyle:'fenced'});
if(typeof turndownPluginGfm !== 'undefined') {
  td.use(turndownPluginGfm.gfm);
}
// 배지 span → 코드 변환
td.addRule('badge',{
  filter: node => node.nodeName==='SPAN' && ['bd','bp','by','bw'].includes(node.className),
  replacement: (content,node) => '`'+node.textContent+'`'
});
// 체크박스 li
td.addRule('taskList',{
  filter: node => node.nodeName==='LI' && node.querySelector('input[type=checkbox]'),
  replacement: (content,node) => {
    const cb = node.querySelector('input[type=checkbox]');
    const check = cb && cb.checked ? '[x]' : '[ ]';
    const txt = node.innerHTML.replace(/<input[^>]*>/,'').trim();
    const plain = td.turndown(txt).trim();
    return `- ${check} ${plain}\n`;
  }
});

// ════════════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════════════
function toast(msg,ms=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}
function fd(d){if(!d)return'';const dt=new Date(d);return`${dt.getMonth()+1}.${dt.getDate()}`;}
function updateWeekLabel(){
  const el=document.getElementById('wn-lbl');
  if(!el)return;
  el.innerHTML=`${WEEK.label} <span class="wn-date">${fd(WEEK.from)}–${fd(WEEK.to)}</span>`;
}
function wkKey(){return `${WEEK.year}-W${String(WEEK.week).padStart(2,'0')}`;}
function sf(s){return s.replace(/ /g,'_').replace(/·/g,'_');}
function gf(site,yr){return `ipark_${sf(site)}_${yr}.json`;}
// 카테고리(공종 항목) — Firebase 동기화 + 메모리 캐시
let CATS_CACHE = null;

function defaultCatsDB(){
  const def={};
  SITES.forEach(s=>{ def[s]=[...(CATS[SITE_TYPE[s]]||CATS['착공'])]; });
  return def;
}

async function loadCatsFromFirebase(){
  if(IS_DEMO){
    CATS_CACHE = defaultCatsDB();
    return;
  }
  try{
    const snap = await fbCatsRef().once('value');
    const val = snap.val();
    if(val){
      CATS_CACHE = val;
    } else {
      CATS_CACHE = defaultCatsDB();
      await fbCatsRef().set(CATS_CACHE);
    }
  }catch(e){
    console.warn('카테고리 로드 실패, 기본값 사용', e);
    CATS_CACHE = defaultCatsDB();
  }
  // 실시간 리스너 — 다른 사용자가 항목을 추가/삭제하면 즉시 반영
  if(!IS_DEMO){
    fbCatsRef().on('value', snap=>{
      const val=snap.val();
      if(val) CATS_CACHE = val;
    });
  }
}

function getCats(site){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  if(CATS_CACHE[site] && CATS_CACHE[site].length) return CATS_CACHE[site];
  const t=SITE_TYPE[site]; return CATS[t]||CATS['착공'];
}

async function persistCats(){
  if(IS_DEMO) return;
  try{ await fbCatsRef().set(CATS_CACHE); }
  catch(e){ toast('항목 저장 실패: '+e.message); }
}

async function addCat(site,name){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  if(!CATS_CACHE[site]) CATS_CACHE[site]=getCats(site);
  if(CATS_CACHE[site].includes(name)){ toast('이미 존재하는 항목입니다'); return false; }
  CATS_CACHE[site].push(name);
  await persistCats();
  return true;
}
async function renameCat(site,oldName,newName){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  if(!CATS_CACHE[site]) CATS_CACHE[site]=getCats(site);
  const idx=CATS_CACHE[site].indexOf(oldName);
  if(idx<0) return false;
  if(CATS_CACHE[site].includes(newName)&&newName!==oldName){ toast('이미 존재하는 이름입니다'); return false; }
  CATS_CACHE[site][idx]=newName;
  await persistCats();
  return true;
}
async function deleteCat(site,name){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  if(!CATS_CACHE[site]) CATS_CACHE[site]=getCats(site);
  if(CATS_CACHE[site].length<=1){ toast('최소 1개 항목은 있어야 합니다'); return false; }
  CATS_CACHE[site]=CATS_CACHE[site].filter(c=>c!==name);
  await persistCats();
  return true;
}

async function doLogin(){

// 앱 초기화 — Firebase에서 사용자/카테고리 선로드 후 세션 복원
async function initApp(){
  await Promise.all([
    loadUsersFromFirebase(),
    loadCatsFromFirebase()
  ]);
  const s=localStorage.getItem('ipark_session');
  if(!s) return;
  try{
    const{id,ts}=JSON.parse(s);
    if(Date.now()-ts>8*3600*1000){localStorage.removeItem('ipark_session');return;}
    const u=getUserDB().find(x=>x.id===id);
    if(!u)return;
    curUser=u; IS_DEMO=false; startApp();
  }catch(e){}
}

// 현장별 실시간 리스너 등록 (다른 사용자의 저장이 즉시 반영됨)
const fbListeners = {};
function attachRealtimeListener(site,year,onChange){
  const key=site+'__'+year;
  if(fbListeners[key])return;
  const ref=fbSiteRef(site,year);
  ref.on('value', snap=>{
    const val=snap.val();
    if(val) onChange(val);
  });
  fbListeners[key]=ref;
}

async function fetchSiteData(site){
  const wk=wkKey();
  if(IS_DEMO){
    if(!dataCache[site+'__'+wk])dataCache[site+'__'+wk]=buildInitData(site);
    return dataCache[site+'__'+wk];
  }
  const ck=site+'__'+wk;
  if(dataCache[ck])return dataCache[ck];
  try{
    const snap=await fbSiteRef(site,WEEK.year).child(wk).once('value');
    const val=snap.val();
    const wd=val||buildInitData(site);
    dataCache[ck]=wd;
    return wd;
  }catch(e){console.warn(site,e);return buildInitData(site);}
}

async function saveSiteData(site,patch){
  const wk=wkKey();
  const ck=site+'__'+wk;
  if(IS_DEMO){
    dataCache[ck]={...(dataCache[ck]||buildInitData(site)),...patch,updated_at:new Date().toISOString()};
    return true;
  }
  try{
    const newData={
      ...(dataCache[ck]||buildInitData(site)),
      ...patch,
      updated_by:curUser?.name||'',
      updated_at:new Date().toISOString()
    };
    await fbSiteRef(site,WEEK.year).child(wk).set(newData);
    dataCache[ck]=newData;
    return true;
  }catch(e){
    toast('저장 오류: '+e.message);
    return false;
  }
}

function renderRollup(rows){
  const div=document.getElementById('rollup');
  div.innerHTML=rows.map(({site,data})=>{
    const t=SITE_TYPE[site];
    const pct=data.progress||0;
    const col=PROG_COL[t]||'#1A5FA8';
    const sc=data.status==='정상'?'st-ok':data.status==='지연'?'st-red':'st-warn';
    const cats=getCats(site);
    const prev=cats.slice(0,3).map(c=>{
      const md=data.gongjong?.[c]?.current_md||'';
      const ln=md.split('\n').find(l=>l.trim().startsWith('- '));
      if(!ln)return null;
      const txt=ln.replace(/^-\s*\[.\]\s*/,'').replace(/`[^`]+`\s*/g,'').trim();
      const done=ln.includes('[x]');
      const warn=ln.includes('`지적`')||ln.includes('`대기`');
      const st=done?'done':warn?'warn':ln.includes('`진행`')?'prog':'plan';
      return{c,txt,st};
    }).filter(Boolean);
    const prevH=prev.length
      ?prev.map(p=>`<div class="tl"><span class="tld d-${p.st}"></span><span class="tlt ${p.st==='done'?'done':''}">${p.c}: ${p.txt.slice(0,28)}${p.txt.length>28?'…':''}</span></div>`).join('')
      :'<div style="font-size:11px;color:var(--tx3)">항목 없음</div>';
    const gjH=cats.slice(0,5).map(c=>{
      const md=data.gongjong?.[c]?.current_md||'';
      const items=md.split('\n').filter(l=>l.trim().startsWith('- '));
      const done=items.filter(l=>l.includes('[x]')).length;
      return`<div class="tl"><span class="tld d-${done>0&&done===items.length?'done':'prog'}"></span><span class="tlt">${c} (${done}/${items.length})</span></div>`;
    }).join('');
    const sk=site.replace(/\s/g,'_');
    return`<div class="site-card" data-site="${site}" id="sc-${sk}">
      <div class="site-head" onclick="toggleInline('${sk}')">
        <span class="s-tag ${STAGS[t]||'t-blue'}">${t}</span>
        <span class="s-name">${site}</span>
        <span class="s-type">${t!=='DX TFT'&&t!=='기반시설'?'아이파크시티':''}</span>
        <div class="s-right">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
          <span class="prog-pct">${t==='착공예정'?'인허가':pct+'%'}</span>
          <span class="s-status ${sc}">${data.status||'정상'}</span>
          <div class="open-btn" onclick="event.stopPropagation();openDetail('${site}')" title="상세">
            <i class="ti ti-layout-sidebar-right-expand"></i></div>
        </div>
      </div>
      <div class="inline-body" id="ib-${sk}">
        <div class="icol">
          <div class="icol-hd"><i class="ti ti-hammer"></i>금주 요약</div>
          ${prevH}
          <div class="more-link" onclick="openDetail('${site}')"><i class="ti ti-arrow-right"></i>상세 편집</div>
        </div>
        <div class="icol">
          <div class="icol-hd"><i class="ti ti-checklist"></i>공종 현황</div>${gjH}
        </div>
      </div>
    </div>`;
  }).join('');
}
function toggleInline(sk){
  const ib=document.getElementById('ib-'+sk);
  const hd=document.querySelector('#sc-'+sk+' .site-head');
  if(!ib)return;
  const open=ib.classList.toggle('open');
  if(hd)hd.classList.toggle('exp',open);
}
function filterSite(chip,site){
  document.querySelectorAll('.subbar .chip').forEach(c=>{c.className='chip';});
  const cls={'all':'on-all','3단지':'on-3','4단지':'on-4','5단지':'on-5','6단지':'on-6','기반시설':'on-inf','DX TFT':'on-dx'};
  chip.className='chip '+(cls[site]||'on-all');
  document.querySelectorAll('.site-card').forEach(card=>{
    card.style.display=(site==='all'||card.dataset.site===site)?'':'none';
  });
}

// 상세 뷰 — contenteditable WYSIWYG
// ════════════════════════════════════════════════════════════
async function openDetail(site){
  curSite=site;
  document.getElementById('d-crumb').innerHTML=`<strong>${site}</strong>`;
  showView('detail',null);
  document.querySelectorAll('.tb-link').forEach(l=>l.classList.remove('active'));
  const data=await fetchSiteData(site);
  const cats=getCats(site);
  if(!curGJ||!cats.includes(curGJ))curGJ=cats[0];
  renderGJSection(site,cats,data);
}

function renderGJSection(site,cats,data){
  const sec=document.getElementById('gj-section');
  const edit=canEdit();
  const tabH='<div class="gj-tabs" id="gj-tabs">'+cats.map((c,idx)=>{
    const md=data.gongjong?.[c]?.current_md||'';
    const items=md.split('\n').filter(l=>l.trim().startsWith('- '));
    const done=items.filter(l=>l.includes('[x]')).length;
    const col=GJ_COL[c]||'var(--blue)';
    const hasW=md.includes('`지적`')||md.includes('`대기`');
    return`<div class="gj-tab${c===curGJ?' active':''}" onclick="switchGJ('${c}')" data-gj="${c}">
      <div class="gj-dot" style="background:${col}"></div>
      <span class="gj-tab-name">${c}</span>
      <span style="font-size:10px;color:${hasW?'var(--red)':'var(--tx3)'}">·${done}/${items.length}</span>
      ${edit?`<div class="gj-tab-edit" onclick="event.stopPropagation();openCatEdit('${site}','${c}')" title="이름 변경"><i class="ti ti-pencil"></i></div>`:''}
    </div>`;
  }).join('')+(edit?`<div class="gj-tab gj-tab-add" onclick="openCatAdd('${site}')" title="항목 추가"><i class="ti ti-plus"></i>항목 추가</div>`:'')+'</div>';
  sec.innerHTML=tabH+'<div id="gj-ed-wrap" style="height:calc(100vh - 90px - 44px - 42px - 32px);display:flex;flex-direction:column;overflow:hidden"></div>';
  renderWYEditor(site,curGJ,data);
}

function openCatAdd(site){
  showModal(`<h4><i class="ti ti-plus"></i>항목 추가</h4>
    <div class="fr"><label>새 항목 이름</label><input type="text" id="m-catname" placeholder="예: 안전관리"></div>`,
    async()=>{
      const name=document.getElementById('m-catname').value.trim();
      if(!name){toast('이름을 입력하세요');return false;}
      const ok=await addCat(site,name);
      if(!ok)return false;
      curGJ=name;
      const data=await fetchSiteData(site);
      if(!data.gongjong)data.gongjong={};
      if(!data.gongjong[name])data.gongjong[name]={current_md:'',next_md:''};
      renderGJSection(site,getCats(site),data);
      toast(`'${name}' 항목이 추가되었습니다`);
    });
}

function openCatEdit(site,catName){
  showModal(`<h4><i class="ti ti-pencil"></i>항목 편집</h4>
    <div class="fr"><label>항목 이름</label><input type="text" id="m-catname2" value="${catName}"></div>
    <div class="fr" style="display:flex;justify-content:flex-end">
      <button class="u-del" style="font-size:12px;padding:6px 12px" onclick="confirmDeleteCat('${site}','${catName}')">
        <i class="ti ti-trash" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>이 항목 삭제</button>
    </div>`,
    async()=>{
      const newName=document.getElementById('m-catname2').value.trim();
      if(!newName){toast('이름을 입력하세요');return false;}
      if(newName===catName)return;
      const ok=await renameCat(site,catName,newName);
      if(!ok)return false;
      const data=await fetchSiteData(site);
      if(data.gongjong&&data.gongjong[catName]){
        data.gongjong[newName]=data.gongjong[catName];
        delete data.gongjong[catName];
      }
      if(curGJ===catName)curGJ=newName;
      renderGJSection(site,getCats(site),data);
      await saveSiteData(site,{gongjong:data.gongjong});
      toast('이름이 변경되었습니다');
    });
}

async function confirmDeleteCat(site,catName){
  if(!confirm(`'${catName}' 항목을 삭제하시겠습니까?\n작성된 내용도 함께 삭제됩니다.`))return;
  const ok=await deleteCat(site,catName);
  if(!ok){ return; }
  closeModal();
  const data=await fetchSiteData(site);
  if(data.gongjong)delete data.gongjong[catName];
  const newCats=getCats(site);
  if(curGJ===catName)curGJ=newCats[0];
  renderGJSection(site,newCats,data);
  await saveSiteData(site,{gongjong:data.gongjong});
  toast('삭제되었습니다');
}

function switchGJ(c){
  curGJ=c;
  document.querySelectorAll('.gj-tab').forEach(t=>t.classList.toggle('active',t.dataset.gj===c));
  fetchSiteData(curSite).then(data=>renderWYEditor(curSite,c,data));
}

const SLASH_CMDS = [
  {cat:'제목', cmds:[
    {icon:'ti-heading',label:'제목 H3',    fn:w=>ceExec(w,'formatBlock','h3')},
    {icon:'ti-heading',label:'소제목 H4',  fn:w=>ceExec(w,'formatBlock','h4')},
  ]},
  {cat:'목록', cmds:[
    {icon:'ti-list',   label:'글머리 목록',fn:w=>ceExec(w,'insertUnorderedList')},
    {icon:'ti-list-numbers',label:'번호 목록',fn:w=>ceExec(w,'insertOrderedList')},
    {icon:'ti-checkbox',label:'체크리스트',fn:w=>insertCheckItem(w)},
  ]},
  {cat:'상태 배지', cmds:[
    {icon:'ti-circle-check',label:'완료',  fn:w=>insertBadge(w,'bd','완료')},
    {icon:'ti-player-play', label:'진행',  fn:w=>insertBadge(w,'bp','진행')},
    {icon:'ti-clock',       label:'예정',  fn:w=>insertBadge(w,'by','예정')},
    {icon:'ti-alert-triangle',label:'지적',fn:w=>insertBadge(w,'bw','지적')},
  ]},
  {cat:'기타', cmds:[
    {icon:'ti-quote', label:'인용문',      fn:w=>ceExec(w,'formatBlock','blockquote')},
    {icon:'ti-minus', label:'구분선',      fn:w=>insertHR(w)},
    {icon:'ti-table', label:'표',          fn:w=>insertTable(w)},
  ]},
];

let slashPop = {open:false, which:'', sel:0, allCmds:[]};

function nwRange(){
  const d=new Date(WEEK.from);d.setDate(d.getDate()+7);
  const e=new Date(d);e.setDate(d.getDate()+4);
  return`${fd(d.toISOString())}–${fd(e.toISOString())}`;
}

function canEdit(){return IS_DEMO||(curUser&&['admin','manager'].includes(curUser.role));}

function renderWYEditor(site,cat,data){
  const wrap=document.getElementById('gj-ed-wrap');
  if(!wrap)return;
  const gjD=data.gongjong?.[cat]||{current_md:'',next_md:''};
  const edit=canEdit();

  wrap.innerHTML=`
  <div class="wy-wrap" id="wy-container">
    ${['cur','nxt'].map(w=>`
    <div class="wy-pane" style="${w==='nxt'?'':''}">
      <div class="wy-pane-hd">
        <h4>${w==='cur'?`<i class="ti ti-hammer"></i>금주 진행사항`:`<i class="ti ti-calendar-event"></i>차주 예정사항`}</h4>
        <span class="wy-badge ${w==='cur'?'wyb-cur':'wyb-nxt'}">${w==='cur'?fd(WEEK.from)+'–'+fd(WEEK.to):nwRange()}</span>
      </div>
      ${edit?`<div class="wy-toolbar" id="tb-${w}">${tbHTML(w)}</div>`:''}
      <div class="wy-ce" id="ce-${w}" ${edit?'contenteditable="true"':'contenteditable="false"'}
        data-ph="${w==='cur'?'내용을 입력하세요. / 를 입력하면 블록 메뉴가 나타납니다':'차주 예정 사항을 입력하세요'}"
        data-which="${w}"
        ${edit?`oninput="onCEInput(this)" onkeydown="onCEKey(event,this)"`:''}
        ></div>
      <div class="slash-pop" id="sp-${w}"></div>
    </div>`).join('')}
  </div>
  <div class="wy-sbar">
    <div class="ws-item"><i class="ti ti-clock"></i>${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div>
    <div class="ws-item" id="ws-stat"><i class="ti ti-align-left"></i>0블록</div>
    <div class="ws-item" id="ws-save" style="color:var(--tx3)"><i class="ti ti-cloud"></i>미저장</div>
    <div class="save-area">
      ${edit?`<div class="save-btn" id="save-btn" onclick="doSave()"><i class="ti ti-device-floppy"></i>저장</div>`
             :'<span style="font-size:11px;color:var(--tx3)">조회 전용</span>'}
    </div>
  </div>`;

  // 마크다운 → HTML 로드
  ['cur','nxt'].forEach(w=>{
    const md=w==='cur'?gjD.current_md:gjD.next_md;
    const ce=document.getElementById('ce-'+w);
    if(md&&md.trim()){
      ce.innerHTML=marked.parse(md);
      // 체크박스 인터랙티브 처리
      ce.querySelectorAll('input[type=checkbox]').forEach(cb=>{
        if(edit){
          cb.disabled=false;
          cb.addEventListener('change',()=>updateWStat());
        } else {
          cb.disabled=true;
        }
      });
    }
    updateWStat();
  });
}

function tbHTML(w){
  return`<span class="wtlbl">서식</span>
    <div class="wt" onmousedown="e=>{e.preventDefault()}" onclick="ceExec('${w}','bold')" title="굵게"><b>B</b></div>
    <div class="wt" onmousedown="e=>{e.preventDefault()}" onclick="ceExec('${w}','italic')" title="기울임"><i style="font-style:italic">I</i></div>
    <div class="wt" onmousedown="e=>{e.preventDefault()}" onclick="ceExec('${w}','strikeThrough')" title="취소선"><s>S</s></div>
    <div class="wtsep"></div>
    <span class="wtlbl">제목</span>
    <div class="wt" onclick="ceExec('${w}','formatBlock','h3')" style="font-size:10px">H3</div>
    <div class="wt" onclick="ceExec('${w}','formatBlock','h4')" style="font-size:10px">H4</div>
    <div class="wtsep"></div>
    <span class="wtlbl">목록</span>
    <div class="wt" onclick="ceExec('${w}','insertUnorderedList')"><i class="ti ti-list"></i></div>
    <div class="wt" onclick="insertCheckItem('${w}')"><i class="ti ti-checkbox"></i></div>
    <div class="wtsep"></div>
    <span class="wtlbl">상태</span>
    <div class="wt" onclick="insertBadge('${w}','bd','완료')" style="background:#EBF3DE;color:#254A09;border-color:transparent;font-size:10px;min-width:28px">완료</div>
    <div class="wt" onclick="insertBadge('${w}','bp','진행')" style="background:#EAF1FB;color:#0B3F7A;border-color:transparent;font-size:10px;min-width:28px">진행</div>
    <div class="wt" onclick="insertBadge('${w}','by','예정')" style="background:#FBF0DC;color:#5E3504;border-color:transparent;font-size:10px;min-width:28px">예정</div>
    <div class="wt" onclick="insertBadge('${w}','bw','지적')" style="background:#FCEAEA;color:#7A1C1C;border-color:transparent;font-size:10px;min-width:28px">지적</div>
    <div class="wtsep"></div>
    <div class="wt" onclick="ceExec('${w}','formatBlock','blockquote')"><i class="ti ti-quote"></i></div>
    <div class="wt" onclick="insertHR('${w}')"><i class="ti ti-minus"></i></div>
    <div class="wt" onclick="insertTable('${w}')" style="font-size:10px">표</div>
    <div class="wtsep"></div>
    <span class="wtlbl" style="color:var(--blue)">/</span>`;
}

// execCommand 래퍼
function ceExec(w,cmd,val){
  focusCE(w);
  document.execCommand(cmd,false,val||null);
  updateWStat();
}

function focusCE(w){
  const ce=document.getElementById('ce-'+w);
  if(ce&&document.activeElement!==ce)ce.focus();
}

function insertBadge(w,cls,txt){
  focusCE(w);
  const span=document.createElement('span');
  span.className=cls; span.textContent=txt;
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const r=sel.getRangeAt(0);
    r.deleteContents();
    r.insertNode(span);
    const sp=document.createTextNode('\u00a0');
    span.after(sp);
    r.setStartAfter(sp); r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
  }
  updateWStat();
}

function insertCheckItem(w){
  focusCE(w);
  const ce=document.getElementById('ce-'+w);
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  const r=sel.getRangeAt(0);
  const li=document.createElement('li');
  const cb=document.createElement('input');
  cb.type='checkbox'; cb.disabled=false;
  cb.addEventListener('change',updateWStat);
  li.appendChild(cb);
  li.appendChild(document.createTextNode('\u00a0'));
  let ul=null;
  // 기존 ul 안에 있으면 그냥 삽입
  let node=r.startContainer;
  while(node&&node!==ce){if(node.nodeName==='UL'){ul=node;break;}node=node.parentNode;}
  if(ul){
    const newLi=li.cloneNode(true);
    newLi.querySelector('input[type=checkbox]').addEventListener('change',updateWStat);
    ul.appendChild(newLi);
    r.setStart(newLi,newLi.childNodes.length); r.collapse(true);
  } else {
    const newUl=document.createElement('ul');
    newUl.appendChild(li);
    r.deleteContents(); r.insertNode(newUl);
    r.setStart(li,li.childNodes.length); r.collapse(true);
  }
  sel.removeAllRanges(); sel.addRange(r);
  updateWStat();
}

function insertHR(w){
  focusCE(w);
  document.execCommand('insertHTML',false,'<hr><p><br></p>');
  updateWStat();
}

function insertTable(w){
  focusCE(w);
  const tbl=`<table><thead><tr><th>항목</th><th>내용</th><th>비고</th></tr></thead><tbody><tr><td></td><td></td><td></td></tr></tbody></table><p><br></p>`;
  document.execCommand('insertHTML',false,tbl);
  updateWStat();
}

function updateWStat(){
  const ce1=document.getElementById('ce-cur');
  const ce2=document.getElementById('ce-nxt');
  if(!ce1)return;
  const blocks=(ce1.querySelectorAll('h3,h4,p,li,blockquote').length)+
               (ce2?ce2.querySelectorAll('h3,h4,p,li,blockquote').length:0);
  const el=document.getElementById('ws-stat');
  if(el)el.innerHTML=`<i class="ti ti-align-left"></i>${blocks}블록`;
  const sv=document.getElementById('ws-save');
  if(sv){sv.innerHTML='<i class="ti ti-pencil"></i> 편집 중';sv.style.color='var(--amber)';}
}

// / 슬래시 명령어
function onCEInput(ce){
  updateWStat();
  const w=ce.dataset.which;
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  const node=sel.focusNode;
  const txt=node?.textContent||'';
  const si=txt.lastIndexOf('/');
  if(si>=0&&txt.slice(si)==='/'){
    showSlash(w,ce);
  } else {
    closeSlash(w);
  }
}

function onCEKey(e,ce){
  const w=ce.dataset.which;
  const sp=document.getElementById('sp-'+w);
  if(sp&&sp.style.display==='block'){
    if(e.key==='ArrowDown'){e.preventDefault();moveSlash(w,1);}
    else if(e.key==='ArrowUp'){e.preventDefault();moveSlash(w,-1);}
    else if(e.key==='Enter'){e.preventDefault();selectSlash(w);}
    else if(e.key==='Escape'){closeSlash(w);}
    return;
  }
  // Tab → 들여쓰기
  if(e.key==='Tab'){e.preventDefault();document.execCommand(e.shiftKey?'outdent':'indent');}
}

function showSlash(w,ce){
  const sp=document.getElementById('sp-'+w);
  if(!sp)return;
  // 플랫 명령 목록
  slashPop.allCmds=SLASH_CMDS.flatMap(g=>g.cmds);
  slashPop.sel=0; slashPop.which=w;
  // 위치
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const rect=sel.getRangeAt(0).getBoundingClientRect();
    const ceRect=ce.getBoundingClientRect();
    sp.style.top=(rect.bottom-ceRect.top+4)+'px';
    sp.style.left=Math.max(0,rect.left-ceRect.left)+'px';
  }
  sp.innerHTML=SLASH_CMDS.map((g,gi)=>
    `<div class="slash-cat">${g.cat}</div>`+
    g.cmds.map((c,ci)=>{
      const idx=SLASH_CMDS.slice(0,gi).reduce((s,x)=>s+x.cmds.length,0)+ci;
      return`<div class="si${idx===0?' sel':''}" data-idx="${idx}" onclick="runSlash('${w}',${idx})">
        <i class="ti ${c.icon}"></i>${c.label}</div>`;
    }).join('')
  ).join('');
  sp.style.display='block';
}

function closeSlash(w){
  const sp=document.getElementById('sp-'+w);
  if(sp)sp.style.display='none';
}

function moveSlash(w,dir){
  const n=slashPop.allCmds.length;
  slashPop.sel=(slashPop.sel+dir+n)%n;
  document.querySelectorAll(`#sp-${w} .si`).forEach((el,i)=>el.classList.toggle('sel',i===slashPop.sel));
}

function selectSlash(w){
  runSlash(w,slashPop.sel);
}

function runSlash(w,idx){
  closeSlash(w);
  // / 문자 삭제
  const ce=document.getElementById('ce-'+w);
  if(ce){
    const sel=window.getSelection();
    if(sel&&sel.rangeCount){
      const r=sel.getRangeAt(0);
      const node=r.startContainer;
      if(node.nodeType===3){
        const txt=node.textContent;
        const si=txt.lastIndexOf('/');
        if(si>=0)node.textContent=txt.slice(0,si);
        r.setStart(node,si>=0?si:r.startOffset); r.collapse(true);
        sel.removeAllRanges(); sel.addRange(r);
      }
    }
  }
  const cmd=slashPop.allCmds[idx];
  if(cmd)cmd.fn(w);
}

// 팝업 외부 클릭 닫기

// 저장 (HTML → Markdown 변환)
// ════════════════════════════════════════════════════════════
async function doSave(){
  const btn=document.getElementById('save-btn');
  const ceCur=document.getElementById('ce-cur');
  const ceNxt=document.getElementById('ce-nxt');
  if(!ceCur)return;
  btn.className='save-btn saving';
  btn.innerHTML='<i class="ti ti-loader"></i> 저장 중...';

  // HTML → Markdown
  const curMd=td.turndown(ceCur.innerHTML||'');
  const nxtMd=td.turndown(ceNxt?.innerHTML||'');

  const data=await fetchSiteData(curSite);
  if(!data.gongjong)data.gongjong={};
  data.gongjong[curGJ]={current_md:curMd,next_md:nxtMd};
  const ok=await saveSiteData(curSite,{gongjong:data.gongjong,progress:data.progress,status:data.status});

  if(ok){
    btn.className='save-btn saved';
    btn.innerHTML='<i class="ti ti-cloud-check"></i> 저장 완료';
    const sv=document.getElementById('ws-save');
    if(sv){sv.innerHTML=`<i class="ti ti-cloud-check"></i> ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 저장`;sv.style.color='var(--green)';}
    toast('저장 완료');
    setTimeout(()=>{btn.className='save-btn';btn.innerHTML='<i class="ti ti-device-floppy"></i>저장';},2500);
  } else {
    btn.className='save-btn';
    btn.innerHTML='<i class="ti ti-device-floppy"></i>저장';
  }
}

// ════════════════════════════════════════════════════════════
// 캘린더
// ════════════════════════════════════════════════════════════
async function renderCal(){
  const y=calYear,m=calMonth;
  document.getElementById('cal-lbl').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const byDay={};
  calEvents.forEach(e=>{const d=parseInt(e.date.split('-')[2]);if(!byDay[d])byDay[d]=[];byDay[d].push(e);});
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const prev=new Date(y,m,0).getDate();
  for(let i=first-1;i>=0;i--)html+=`<div class="cal-cell other"><div class="cal-dn">${prev-i}</div></div>`;
  for(let d=1;d<=days;d++){
    const dow=(first+d-1)%7;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const evs=byDay[d]||[];
    const evH=evs.slice(0,2).map(e=>`<div class="cal-ev ev-${e.event_type==='대외'?'ext':e.event_type==='대내'?'int':e.event_type==='DX'?'dx':'site'}" title="${e.title}">${e.title}</div>`).join('');
    const more=evs.length>2?`<div class="ev-more">+${evs.length-2}건</div>`:'';
    html+=`<div class="cal-cell${isT?' today':''}"><div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>${evH}${more}</div>`;
  }
  const rem=7-((first+days)%7||7);
  for(let i=1;i<=rem&&rem<7;i++)html+=`<div class="cal-cell other"><div class="cal-dn">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
  const sorted=[...calEvents].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('ev-cnt').textContent=`${y}년 ${m+1}월 전체 일정 (${sorted.length}건)`;
  const TS={대외:{dot:'#A82B2B',bg:'var(--red-bg)',fg:'var(--red-tx)'},대내:{dot:'#1A5FA8',bg:'var(--blue-bg)',fg:'var(--blue-tx)'},DX:{dot:'#4E45B0',bg:'var(--purple-bg)',fg:'var(--purple-tx)'},공정:{dot:'#0C6B52',bg:'var(--teal-bg)',fg:'var(--teal-tx)'}};
  document.getElementById('ev-list').innerHTML=sorted.map(e=>{
    const t=TS[e.event_type]||TS['대내'];
    const dd=e.date.slice(5).replace('-','.');
    return`<div class="ev-item"><div class="ev-dot" style="background:${t.dot}"></div><div class="ev-date">${dd}</div><div class="ev-type" style="background:${t.bg};color:${t.fg}">${e.event_type}</div><div class="ev-title">${e.title}</div><div class="ev-site-lbl">${e.site_code}</div><div class="ev-del" onclick="delEvent(${e.id})"><i class="ti ti-x"></i></div></div>`;
  }).join('');
}
function chgMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
function delEvent(id){
  if(!confirm('삭제할까요?'))return;
  calEvents=calEvents.filter(e=>e.id!==id);
  renderCal(); toast('삭제 완료');
}
function openAddEvent(site){
  const sites=['통합',...SITES];
  const td2=new Date().toISOString().slice(0,10);
  showModal(`<h4><i class="ti ti-calendar-plus"></i>일정 추가</h4>
    <div class="fr"><label>날짜</label><input type="date" id="m-dt" value="${td2}"></div>
    <div class="fr"><label>구분</label><select id="m-tp"><option>대외</option><option>대내</option><option>DX</option><option>공정</option></select></div>
    <div class="fr"><label>현장</label><select id="m-st">${sites.map(s=>`<option${s===site?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fr"><label>일정 내용</label><input type="text" id="m-tt" placeholder="예: 발주처 공정회의"></div>`,
    ()=>{
      const title=document.getElementById('m-tt').value.trim();
      if(!title){toast('내용 입력 필요');return false;}
      calEvents.push({id:Date.now(),date:document.getElementById('m-dt').value,event_type:document.getElementById('m-tp').value,title,site_code:document.getElementById('m-st').value});
      renderCal(); toast('일정 추가 완료');
    });
}

      <div style="flex:1"><div class="u-nm">${u.name} <span class="u-id">(${u.id})</span></div>

    </div>`).join('');
}
async function addUser(){
  const id=document.getElementById('nu-id').value.trim();
  const pw=document.getElementById('nu-pw').value;
  const name=document.getElementById('nu-name').value.trim();
  const role=document.getElementById('nu-role').value;
  const site=document.getElementById('nu-site').value;
  if(!id||!pw||!name){toast('아이디·비밀번호·이름 필수');return;}
  const users=getUserDB();
  if(users.find(u=>u.id===id)){toast('이미 존재하는 아이디');return;}
  users.push({id,pw:btoa(pw),name,role,site});
  await saveUserDB(users); renderUList();
  ['nu-id','nu-pw','nu-name'].forEach(x=>document.getElementById(x).value='');
  toast(`'${name}' 추가 완료`);
}
async function delUser(id){
  if(!confirm('사용자를 삭제할까요?'))return;
  await saveUserDB(getUserDB().filter(u=>u.id!==id));
  renderUList(); toast('삭제 완료');
}
async function changePw(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const c2=document.getElementById('pw-c2').value;
  if(!cur||!nw||!c2){toast('모든 항목 입력 필요');return;}
  if(nw!==c2){toast('새 비밀번호 불일치');return;}
  if(nw.length<6){toast('6자 이상');return;}
  const users=getUserDB();
  const u=users.find(x=>x.id===curUser.id);
  if(!u||u.pw!==btoa(cur)){toast('현재 비밀번호 오류');return;}
  u.pw=btoa(nw); await saveUserDB(users);
  ['pw-cur','pw-new','pw-c2'].forEach(x=>document.getElementById(x).value='');
  toast('비밀번호 변경 완료');
}

function showModal(inner,onSave){
  document.getElementById('modal-root').innerHTML=
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">${inner}
        <div class="modal-btns">
          <button class="btn-c" onclick="closeModal()">취소</button>
          <button class="btn-s" id="ms-btn">저장</button>
        </div>
      </div>
    </div>`;
  document.getElementById('ms-btn').onclick=async()=>{
    try{const ok=await onSave();if(ok!==false)closeModal();}
    catch(e){toast('오류: '+e.message);}
  };
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
