<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>천안IPC 주간업무현황 v3.1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown@7/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1/dist/turndown-plugin-gfm.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#F5F4F0;--bg2:#fff;--bg3:#EEECEA;
  --bd:#E0DED8;--bd2:#CECCCA;
  --tx:#1C1C1A;--tx2:#5A5955;--tx3:#99978F;
  --blue:#1A5FA8;--blue-bg:#EAF1FB;--blue-tx:#0B3F7A;
  --green:#3A6E12;--green-bg:#EBF3DE;--green-tx:#254A09;
  --amber:#8A5009;--amber-bg:#FBF0DC;--amber-tx:#5E3504;
  --red:#A82B2B;--red-bg:#FCEAEA;--red-tx:#7A1C1C;
  --purple:#4E45B0;--purple-bg:#EEEDFE;--purple-tx:#332E84;
  --teal:#0C6B52;--teal-bg:#E0F4EE;--teal-tx:#084835;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--tx);font-size:18px;line-height:1.6}

/* ── 로그인 ── */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:32px 36px;width:400px;max-width:95vw}
.login-logo{font-size:13px;color:var(--tx3);font-weight:700;letter-spacing:.06em;margin-bottom:4px}
.login-title{font-size:29px;font-weight:700;color:var(--tx);margin-bottom:4px;letter-spacing:-.02em}
.login-sub{font-size:16px;color:var(--tx2);margin-bottom:22px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.fi{width:100%;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--r);font-size:17px;color:var(--tx);background:var(--bg2)}
.fi:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.login-btn:hover{background:var(--blue-tx)}
.login-btn:disabled{opacity:.6;cursor:default}
.login-err{font-size:14px;color:var(--red);margin-top:8px;min-height:16px}
.login-demo{font-size:14px;color:var(--blue);margin-top:12px;text-align:center;cursor:pointer}
.login-demo:hover{text-decoration:underline}
.login-ver{font-size:13px;color:var(--tx3);text-align:center;margin-top:14px}

/* ── 상단바 ── */
#app{display:none}
.topbar{
  height:58px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:grid;
  grid-template-columns:auto 1fr auto;  /* brand | nav | right */
  align-items:center;
  padding:0 16px;gap:0;
  position:sticky;top:0;z-index:200;
}
.tb-brand{display:flex;flex-direction:column;padding-right:14px;border-right:1px solid var(--bd);margin-right:0;flex-shrink:0}
.tb-brand .co{font-size:13px;color:var(--tx3)}
.tb-brand .nm{font-size:17px;font-weight:700;color:var(--tx);white-space:nowrap}
.tb-nav{display:flex;align-items:center;gap:0;padding-left:4px;overflow:hidden}
.tb-link{font-size:16px;color:var(--tx2);padding:0 12px;height:58px;display:flex;align-items:center;gap:5px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tb-link i{font-size:18px}
.tb-link.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tb-link:hover:not(.active){background:var(--bg3)}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-left:8px}
.week-nav{display:flex;align-items:center;gap:3px}
.wn-btn{width:26px;height:26px;border:1px solid var(--bd);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2)}
.wn-btn:hover{background:var(--bg3)}
.wn-btn i{font-size:14px}
.wn-lbl{font-size:14px;font-weight:700;color:var(--tx);background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:2px 10px;min-width:128px;text-align:center;white-space:nowrap;display:flex;align-items:center;gap:5px;justify-content:center;cursor:pointer;transition:background .15s}
.wn-lbl:hover{background:var(--blue-bg);color:var(--blue-tx)}
.wn-lbl .wn-date{font-size:13px;font-weight:500;color:var(--tx2)}
.user-chip{font-size:14px;background:var(--blue-bg);color:var(--blue-tx);border-radius:99px;padding:3px 10px;display:flex;align-items:center;gap:3px;font-weight:700;white-space:nowrap}
.user-chip i{font-size:16px}
.icon-btn{width:30px;height:30px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2);flex-shrink:0}
.icon-btn:hover{background:var(--bg3)}
.icon-btn i{font-size:17px}
.ver-chip{font-size:13px;color:var(--tx3);white-space:nowrap}

/* ── 서브바 ── */
.subbar{height:40px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:5px;position:sticky;top:50px;z-index:199;overflow-x:auto}
.sb-lbl{font-size:13px;color:var(--tx3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-right:2px;flex-shrink:0}
.chip{font-size:14px;padding:3px 10px;border-radius:99px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500;white-space:nowrap;flex-shrink:0}
.chip.on-all{background:var(--tx);color:var(--bg2);border-color:transparent}
.chip.on-3,.chip.on-4{background:var(--amber-bg);color:var(--amber-tx);border-color:transparent}
.chip.on-5,.chip.on-6{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.chip.on-inf{background:var(--teal-bg);color:var(--teal-tx);border-color:transparent}
.chip.on-dx{background:var(--purple-bg);color:var(--purple-tx);border-color:transparent}

/* ── 뷰 ── */
.view{display:none}.view.active{display:flex;flex-direction:column}

/* ── 단지별 취합 화면 ── */
.ov-bar{height:44px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.ov-site-name{font-size:20px;font-weight:700;color:var(--tx)}
.ov-bar-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.ov-compare-hd{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bd);background:var(--bg3);flex-shrink:0}
.ov-col-hd{font-size:14px;font-weight:700;color:var(--tx2);padding:8px 16px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.03em}
.ov-col-hd:first-child{border-right:1px solid var(--bd)}
.ov-col-hd i{font-size:17px}
.ov-body{flex:1;overflow-y:auto}
.ov-gj-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--bd)}
.ov-gj-cell{padding:12px 16px}
.ov-gj-cell:first-child{border-right:1px solid var(--bd)}
.ov-gj-label{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.ov-gj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ov-gj-name{font-size:16px;font-weight:700;color:var(--tx);cursor:pointer}
.ov-gj-name:hover{color:var(--blue)}
.ov-gj-cnt{font-size:13px;color:var(--tx3);margin-left:auto;font-weight:600}
.ov-gj-body{font-size:14px;color:var(--tx2);line-height:1.6}
.ov-gj-body h1{font-size:18px;font-weight:700;color:var(--tx);margin:5px 0 3px}
.ov-gj-body h1:first-child{margin-top:0}
.ov-gj-body h2{font-size:17px;font-weight:700;color:var(--tx);margin:5px 0 3px}
.ov-gj-body h2:first-child{margin-top:0}
.ov-gj-body h3{font-size:16px;font-weight:600;color:var(--tx);margin:5px 0 2px}
.ov-gj-body h3:first-child{margin-top:0}
.ov-gj-body h4{font-size:14px;font-weight:600;color:var(--tx);margin:4px 0 2px}
.ov-gj-body ul{margin:2px 0 2px 14px}
.ov-gj-body li{margin-bottom:2px;line-height:1.5}
.ov-gj-body li input[type=checkbox]{margin-right:4px;accent-color:var(--blue);pointer-events:none}
.ov-gj-body strong{font-weight:600;color:var(--tx)}
.ov-gj-body code{font-family:'SF Mono','Fira Code',monospace;font-size:13px;background:var(--bg3);padding:1px 4px;border-radius:3px;border:0.5px solid var(--bd)}
.ov-gj-body blockquote{border-left:2px solid var(--bd2);padding:2px 8px;color:var(--tx3);margin:3px 0;background:var(--bg3);border-radius:0 3px 3px 0;font-size:13px}
.ov-gj-body p{margin-bottom:2px}
.ov-gj-body .bd{background:var(--green-bg);color:var(--green-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.ov-gj-body .bp{background:var(--blue-bg);color:var(--blue-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.ov-gj-body .by{background:var(--amber-bg);color:var(--amber-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.ov-gj-body .bw{background:var(--red-bg);color:var(--red-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.ov-empty{font-size:14px;color:var(--tx3);font-style:italic}

/* ── 롤업 ── */
.rollup{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.site-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.site-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s}
.site-head:hover,.site-head.exp{background:var(--bg3)}
.s-tag{font-size:13px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}
.t-blue{background:var(--blue-bg);color:var(--blue-tx)}
.t-amber{background:var(--amber-bg);color:var(--amber-tx)}
.t-teal{background:var(--teal-bg);color:var(--teal-tx)}
.t-purple{background:var(--purple-bg);color:var(--purple-tx)}
.s-name{font-size:18px;font-weight:700;color:var(--tx);min-width:55px}
.s-type{font-size:14px;color:var(--tx3)}
.s-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-bar{width:64px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:14px;color:var(--tx2);min-width:34px;text-align:right;font-weight:700}
.s-status{font-size:13px;padding:2px 7px;border-radius:99px;font-weight:700}
.st-ok{background:var(--green-bg);color:var(--green-tx)}
.st-warn{background:var(--amber-bg);color:var(--amber-tx)}
.st-red{background:var(--red-bg);color:var(--red-tx)}
.open-btn{width:24px;height:24px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);background:var(--bg2);transition:all .15s;flex-shrink:0}
.open-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.open-btn i{font-size:16px}
.inline-body{display:none;border-top:1px solid var(--bd)}
.inline-body.open{display:block}
.rollup-all-cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:0}
.rollup-gj-block{padding:10px 16px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.rollup-gj-hd{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.rollup-gj-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rollup-gj-name{font-size:14px;font-weight:700;color:var(--tx2);letter-spacing:.02em}
.rollup-gj-cnt{font-size:13px;margin-left:auto;font-weight:600}
.rollup-gj-body{font-size:14px;color:var(--tx2);line-height:1.6}
.rollup-gj-body h1{font-size:18px;font-weight:700;color:var(--tx);margin:6px 0 3px}
.rollup-gj-body h1:first-child{margin-top:0}
.rollup-gj-body h2{font-size:17px;font-weight:700;color:var(--tx);margin:5px 0 3px}
.rollup-gj-body h2:first-child{margin-top:0}
.rollup-gj-body h3{font-size:16px;font-weight:600;color:var(--tx);margin:5px 0 2px}
.rollup-gj-body h3:first-child{margin-top:0}
.rollup-gj-body h4{font-size:14px;font-weight:600;color:var(--tx);margin:4px 0 2px}
.rollup-gj-body ul{margin:2px 0 2px 14px}
.rollup-gj-body li{margin-bottom:2px;line-height:1.5}
.rollup-gj-body li input[type=checkbox]{margin-right:4px;accent-color:var(--blue);pointer-events:none}
.rollup-gj-body strong{font-weight:600;color:var(--tx)}
.rollup-gj-body code{font-family:'SF Mono','Fira Code',monospace;font-size:13px;background:var(--bg3);padding:1px 4px;border-radius:3px;border:0.5px solid var(--bd)}
.rollup-gj-body blockquote{border-left:2px solid var(--bd2);padding:2px 8px;color:var(--tx3);margin:3px 0;background:var(--bg3);border-radius:0 3px 3px 0;font-size:13px}
.rollup-gj-body p{margin-bottom:2px}
.rollup-gj-body .bd{background:var(--green-bg);color:var(--green-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.rollup-gj-body .bp{background:var(--blue-bg);color:var(--blue-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.rollup-gj-body .by{background:var(--amber-bg);color:var(--amber-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.rollup-gj-body .bw{background:var(--red-bg);color:var(--red-tx);font-size:12px;padding:1px 5px;border-radius:99px}
.rollup-empty{font-size:14px;color:var(--tx3);font-style:italic;padding:2px 0}
.tl{display:flex;align-items:flex-start;gap:5px;margin-bottom:4px}
.tld{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d-done{background:#3A6E12}.d-prog{background:#1A5FA8}
.d-plan{background:#8A5009}.d-warn{background:#A82B2B}
.tlt{font-size:14px;color:var(--tx2);line-height:1.45;flex:1}
.tlt.done{color:var(--tx3);text-decoration:line-through}
.more-link{font-size:14px;color:var(--blue);margin-top:4px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

/* ── 상세 뷰 (WYSIWYG) ── */
.dv{height:calc(100vh - 98px);overflow:hidden;display:flex;flex-direction:column}
.dv-bar{height:44px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:6px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:4px;font-size:16px;color:var(--tx2);cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.back-btn:hover{background:var(--bg3)}
.back-btn i{font-size:17px}
.crumb{font-size:16px;color:var(--tx3)}
.crumb strong{color:var(--tx);font-weight:700}
.dv-bar-r{margin-left:auto;display:flex;gap:5px;align-items:center}
.gj-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0;overflow-x:auto;padding:0 16px}
.gj-tab{font-size:16px;padding:8px 12px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.gj-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.gj-tab:hover:not(.active){background:var(--bg3)}
.gj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gj-tab-edit{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0;color:var(--tx3);margin-left:2px;flex-shrink:0}
.gj-tab-edit i{font-size:13px}
.gj-tab:hover .gj-tab-edit{opacity:.7}
.gj-tab-edit:hover{opacity:1!important;background:var(--bg3);color:var(--tx)}
.gj-tab-add{color:var(--blue)!important;border-bottom-color:transparent!important;gap:4px}
.gj-tab-add:hover{background:var(--blue-bg)!important}
.gj-tab-add i{font-size:17px}
.gj-drag-handle{width:14px;height:20px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--tx3);opacity:0;flex-shrink:0;margin-right:1px}
.gj-drag-handle i{font-size:13px;pointer-events:none}
.gj-tab:hover .gj-drag-handle{opacity:.5}
.gj-drag-handle:hover{opacity:1!important;color:var(--tx)}
.gj-drag-handle:active{cursor:grabbing}
.gj-tab-dragging{opacity:.35;background:var(--bg3)!important;border-bottom:2px dashed var(--bd2)!important}
.gj-tab-drag-over{background:var(--blue-bg)!important;border-left:3px solid var(--blue)}

/* ── WYSIWYG 에디터 ── */
.wy-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;border-top:1px solid var(--bd)}
.wy-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.wy-pane:first-child{border-right:1px solid var(--bd)}
.wy-pane-hd{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--bd);background:var(--bg3);flex-shrink:0}
.wy-pane-hd h4{font-size:14px;font-weight:700;color:var(--tx2);display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.04em}
.wy-pane-hd h4 i{font-size:16px}
.wy-badge{font-size:13px;padding:2px 6px;border-radius:99px;font-weight:600}
.wyb-cur{background:var(--blue-bg);color:var(--blue-tx)}
.wyb-nxt{background:var(--green-bg);color:var(--green-tx)}
.wy-copy-btn{margin-left:auto;font-size:13px;padding:3px 9px;border:1px solid var(--bd2);border-radius:99px;background:var(--bg2);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;transition:all .15s}
.wy-copy-btn:hover{background:var(--blue);color:#fff;border-color:transparent}
.wy-copy-btn i{font-size:14px}
.wy-auto-note{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue-tx);background:var(--blue-bg);padding:4px 12px;border-top:1px solid var(--bd);flex-shrink:0}
.wy-auto-note i{font-size:16px}

/* 툴바 */
.wy-toolbar{display:flex;align-items:center;gap:1px;padding:4px 8px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-wrap:wrap;flex-shrink:0}
.wt{min-width:28px;height:28px;border:0.5px solid var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;color:var(--tx2);background:var(--bg2);padding:0 4px;user-select:none;white-space:nowrap;transition:all .1s;flex-shrink:0}
.wt:hover{background:var(--bg3);color:var(--tx);border-color:var(--bd2)}
.wt.on{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.wtsep{width:0.5px;height:14px;background:var(--bd);margin:0 2px;flex-shrink:0}
.wtlbl{font-size:13px;color:var(--tx3);padding:0 2px;flex-shrink:0}

/* contenteditable 영역 */
.wy-ce{flex:1;outline:none;padding:14px 16px;overflow-y:auto;font-size:17px;line-height:1.75;color:var(--tx);caret-color:var(--blue)}
.wy-ce:empty::before{content:attr(data-ph);color:var(--tx3);font-size:16px;pointer-events:none}
.wy-ce h1{font-size:25px;font-weight:700;color:var(--tx);margin:14px 0 6px;letter-spacing:-.01em}
.wy-ce h1:first-child{margin-top:0}
.wy-ce h2{font-size:21px;font-weight:700;color:var(--tx);margin:13px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--bd2)}
.wy-ce h2:first-child{margin-top:0}
.wy-ce h3{font-size:18px;font-weight:600;color:var(--tx);margin:12px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.wy-ce h3:first-child{margin-top:0}
.wy-ce h4{font-size:17px;font-weight:600;color:var(--tx);margin:8px 0 3px}
.wy-ce p{color:var(--tx2);font-size:16px;margin:2px 0;min-height:20px}
.wy-ce p:empty::before{content:'여기에 입력...';color:var(--tx3);font-size:14px}
.wy-ce ul,.wy-ce ol{margin:2px 0 2px 18px}
.wy-ce li{color:var(--tx2);font-size:16px;margin-bottom:3px;line-height:1.6}
.wy-ce li input[type=checkbox]{margin-right:5px;accent-color:var(--blue);cursor:pointer}
.wy-ce blockquote{border-left:3px solid var(--bd2);padding:3px 10px;margin:5px 0;color:var(--tx3);background:var(--bg3);border-radius:0 4px 4px 0;font-size:14px}
.wy-ce code{font-family:'SF Mono','Fira Code',monospace;font-size:13px;background:var(--bg3);padding:1px 5px;border-radius:3px;border:0.5px solid var(--bd)}
.wy-ce pre{background:var(--bg3);padding:10px 12px;border-radius:var(--r);margin:5px 0;overflow-x:auto}
.wy-ce pre code{background:none;border:none;font-size:14px}
.wy-ce strong{font-weight:600;color:var(--tx)}
.wy-ce em{font-style:italic}
.wy-ce hr{border:none;border-top:0.5px solid var(--bd);margin:10px 0}
.wy-ce table{width:100%;border-collapse:collapse;font-size:14px;margin:6px 0}
.wy-ce th{background:var(--bg3);padding:4px 8px;border:1px solid var(--bd);font-weight:700;color:var(--tx);text-align:left}
.wy-ce td{padding:4px 8px;border:1px solid var(--bd);color:var(--tx2)}

/* 상태 배지 */
.wy-ce .bd,.bd{background:#EBF3DE;color:#254A09;font-size:13px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .bp,.bp{background:#EAF1FB;color:#0B3F7A;font-size:13px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .by,.by{background:#FBF0DC;color:#5E3504;font-size:13px;padding:1px 6px;border-radius:99px;font-family:inherit}
.wy-ce .bw,.bw{background:#FCEAEA;color:#7A1C1C;font-size:13px;padding:1px 6px;border-radius:99px;font-family:inherit}

/* /명령어 팝업 */
.slash-pop{position:absolute;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r2);padding:5px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:300;min-width:210px;display:none;max-height:300px;overflow-y:auto}
.si{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:var(--r);font-size:16px;color:var(--tx2)}
.si:hover,.si.sel{background:var(--blue-bg);color:var(--blue-tx)}
.si i{font-size:18px;width:18px;text-align:center;flex-shrink:0}
.si .sh{font-size:13px;margin-left:auto;opacity:.6}
.si:hover .sh,.si.sel .sh{opacity:1}
.slash-cat{font-size:13px;color:var(--tx3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px 3px;margin-top:4px}
.slash-cat:first-child{margin-top:0}

/* 상태바 */
.wy-sbar{height:28px;background:var(--bg3);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.ws-item{font-size:13px;color:var(--tx3);display:flex;align-items:center;gap:3px}
.ws-item i{font-size:14px}
.save-area{margin-left:auto;display:flex;align-items:center;gap:6px}
.save-btn{font-size:14px;padding:4px 12px;border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--tx2);display:flex;align-items:center;gap:4px;font-weight:700;transition:all .15s}
.save-btn:hover{background:var(--blue);color:#fff;border-color:transparent}
.save-btn.saving{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent;pointer-events:none}
.save-btn.saved{background:var(--green-bg);color:var(--green-tx);border-color:transparent}

/* ── 캘린더 ── */
.cal-hdr{height:44px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.cal-title{font-size:18px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px}
.cal-nav{width:26px;height:26px;border:1px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.cal-nav:hover{background:var(--bg3)}
.cal-nav i{font-size:16px}
.cal-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cal-leg{display:flex;align-items:center;gap:8px}
.leg{display:flex;align-items:center;gap:3px;font-size:14px;color:var(--tx2)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.add-ev-btn{font-size:14px;padding:4px 10px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500;transition:all .15s}
.add-ev-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.add-ev-btn i{font-size:16px}
.cal-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.cal-hint{font-size:13px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.cal-hint i{font-size:14px}
.cal-site-leg{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cal-site-leg-lbl{font-size:13px;color:var(--tx3);font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cal-dow{background:var(--bg3);text-align:center;font-size:13px;font-weight:700;color:var(--tx3);padding:6px 0;letter-spacing:.04em}
.cal-dow.sun{color:var(--red)}.cal-dow.sat{color:var(--blue)}
.cal-cell{background:var(--bg2);min-height:88px;padding:4px 5px;cursor:pointer}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.today{background:var(--blue-bg)}
.cal-cell.other .cal-dn{opacity:.3}
.cal-dn{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:2px}
.cal-dn.sun{color:var(--red)}.cal-dn.sat{color:var(--blue)}
.cal-ev{font-size:13px;padding:1px 5px 1px 6px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;cursor:pointer}
.ev-ext{background:var(--red-bg);color:var(--red-tx)}
.ev-int{background:var(--blue-bg);color:var(--blue-tx)}
.ev-dx{background:var(--purple-bg);color:var(--purple-tx)}
.ev-site{background:var(--teal-bg);color:var(--teal-tx)}
.ev-more{font-size:13px;color:var(--tx3);padding:1px 4px}
.ev-lhdr{display:flex;align-items:center;justify-content:space-between}
.ev-lhdr span{font-size:17px;font-weight:700;color:var(--tx)}
.ev-list{display:flex;flex-direction:column;gap:4px}
.ev-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg2)}
.ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ev-date{font-size:14px;color:var(--tx3);width:38px;flex-shrink:0;font-weight:600}
.ev-type{font-size:13px;padding:2px 6px;border-radius:99px;flex-shrink:0;font-weight:700}
.ev-title{font-size:16px;color:var(--tx);flex:1;font-weight:500}
.ev-site-tag{font-size:14px;font-weight:700}
.ev-site-lbl{font-size:13px;color:var(--tx3)}
.ev-del{width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);border-radius:3px}
.ev-del:hover{color:var(--red)}.ev-del i{font-size:14px}

/* ── 사용자 패널 ── */
.up-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:600}
.up-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);width:500px;max-width:95vw;max-height:82vh;overflow:hidden;display:flex;flex-direction:column}
.up-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--bg3)}
.up-hdr h3{font-size:20px;font-weight:700;color:var(--tx);flex:1;display:flex;align-items:center;gap:6px}
.up-hdr h3 i{font-size:21px}
.up-close{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);border-radius:var(--r);border:1px solid var(--bd)}
.up-close:hover{background:var(--red-bg);color:var(--red)}
.up-close i{font-size:17px}
.up-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px}
.up-sec{font-size:13px;font-weight:700;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;padding-bottom:5px;border-bottom:0.5px solid var(--bd);margin-bottom:2px}
.urow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:var(--r);border:0.5px solid var(--bd)}
.uav{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-tx);flex-shrink:0}
.u-nm{font-size:16px;font-weight:700;color:var(--tx);flex:1}
.u-id{font-size:14px;color:var(--tx3)}
.u-role{font-size:13px;padding:2px 6px;border-radius:99px;font-weight:700}
.ra{background:var(--purple-bg);color:var(--purple-tx)}
.rm{background:var(--blue-bg);color:var(--blue-tx)}
.rv{background:var(--bg3);color:var(--tx2);border:0.5px solid var(--bd)}
.u-act{display:flex;gap:4px}
.u-del{font-size:14px;padding:2px 7px;border:0.5px solid var(--bd2);border-radius:5px;cursor:pointer;background:var(--bg2);color:var(--tx2)}
.u-del:hover{background:var(--red-bg);color:var(--red);border-color:transparent}
.up-form{background:var(--bg3);border:0.5px solid var(--bd);border-radius:var(--r);padding:12px}
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.up-form label{display:block;font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:3px}
.up-form input,.up-form select{width:100%;padding:6px 9px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:16px;color:var(--tx);background:var(--bg2)}
.up-form input:focus,.up-form select:focus{outline:none;border-color:var(--blue)}
.up-add-btn{font-size:16px;padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-weight:700}
.pw-form{background:var(--bg3);border:0.5px solid var(--bd);border-radius:var(--r);padding:12px}
.pw-form label{display:block;font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:3px}
.pw-form input{width:100%;padding:6px 9px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:16px;color:var(--tx);background:var(--bg2);margin-bottom:7px}
.pw-form input:focus{outline:none;border-color:var(--blue)}
.pw-save{font-size:16px;padding:6px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-weight:700}

/* ── 모달 ── */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bd);padding:20px;width:370px}
.modal h4{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.modal h4 i{font-size:21px}
.fr{margin-bottom:11px}
.fr label{display:block;font-size:14px;font-weight:700;color:var(--tx2);margin-bottom:3px}
.fr input,.fr select,.fr textarea{width:100%;font-size:16px;padding:6px 9px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx)}
.fr input:focus,.fr select:focus{outline:none;border-color:var(--blue)}
.modal-btns{display:flex;justify-content:flex-end;gap:7px;margin-top:14px}
.btn-c{font-size:16px;padding:5px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx2);cursor:pointer}
.btn-s{font-size:16px;padding:5px 14px;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:700}

.app-footer{height:26px;background:var(--bg2);border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-footer span{font-size:13px;color:var(--tx3);letter-spacing:.02em}

/* ── 토스트·로딩 ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg2);font-size:16px;padding:8px 18px;border-radius:99px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;font-weight:600;white-space:nowrap}
.toast.show{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;padding:44px;color:var(--tx3);font-size:17px;gap:8px}
.loading i{font-size:23px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">HDC현대산업개발</div>
    <div class="login-title">천안IPC 주간업무현황</div>
    <div class="login-sub">현장 통합 주간보고 시스템</div>
    <div class="fg">
      <label>아이디</label>
      <input class="fi" id="li-id" type="text" placeholder="아이디 입력"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fg">
      <label>비밀번호</label>
      <input class="fi" id="li-pw" type="password" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="li-err"></div>
    <button class="login-btn" id="li-btn" onclick="doLogin()">
      <i class="ti ti-login"></i>로그인
    </button>
    <div class="login-demo" onclick="demoMode()">
      <i class="ti ti-eye" style="font-size:16px;vertical-align:-1px"></i>
      데모 모드로 보기
    </div>
    <div class="login-ver" id="login-ver"></div>
  </div>
</div>

<!-- ── 앱 ── -->
<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <span class="co">HDC현대산업개발</span>
      <span class="nm">천안IPC 통합현장</span>
    </div>
    <div class="tb-nav" id="tb-nav">
      <div class="tb-link site-nav-link active" id="nav-site-3단지" onclick="openSiteOverview('3단지',this)">3단지</div>
      <div class="tb-link site-nav-link" id="nav-site-4단지" onclick="openSiteOverview('4단지',this)">4단지</div>
      <div class="tb-link site-nav-link" id="nav-site-5단지" onclick="openSiteOverview('5단지',this)">5단지</div>
      <div class="tb-link site-nav-link" id="nav-site-6단지" onclick="openSiteOverview('6단지',this)">6단지</div>
      <div class="tb-link site-nav-link" id="nav-site-기반시설" onclick="openSiteOverview('기반시설',this)">기반시설</div>
      <div class="tb-link site-nav-link" id="nav-site-DX_TFT" onclick="openSiteOverview('DX TFT',this)">DX TFT</div>
      <div class="tb-link" id="nav-cal" onclick="showView('cal',this)">
        <i class="ti ti-calendar-event" aria-hidden="true"></i>주요 일정</div>
    </div>
    <div class="tb-right">
      <div class="week-nav">
        <div class="wn-btn" onclick="chgWeek(-1)"><i class="ti ti-chevron-left"></i></div>
        <div class="wn-lbl" id="wn-lbl" onclick="goToThisWeek()" title="클릭하면 이번 주로 이동">25주차</div>
        <div class="wn-btn" onclick="chgWeek(1)"><i class="ti ti-chevron-right"></i></div>
      </div>
      <div class="user-chip"><i class="ti ti-user"></i><span id="user-nm">-</span></div>
      <div class="icon-btn" id="admin-btn" title="사용자 관리" style="display:none" onclick="openUP()">
        <i class="ti ti-users"></i></div>
      <div class="icon-btn" onclick="doLogout()" title="로그아웃">
        <i class="ti ti-logout"></i></div>
    </div>
  </div>

  <!-- 단지별 취합 화면 -->
  <div class="view active" id="view-overview">
    <div class="ov-bar">
      <span class="ov-site-name" id="ov-site-name">3단지</span>
      <div class="ov-bar-r">
        <div class="icon-btn" id="ov-edit-btn" onclick="openDetail(curOvSite)" title="편집 화면으로 이동">
          <i class="ti ti-edit"></i></div>
      </div>
    </div>
    <div class="ov-compare-hd">
      <div class="ov-col-hd"><i class="ti ti-hammer" aria-hidden="true"></i>금주 진행사항</div>
      <div class="ov-col-hd"><i class="ti ti-calendar-event" aria-hidden="true"></i>차주 예정사항</div>
    </div>
    <div class="ov-body" id="ov-body"><div class="loading"><i class="ti ti-loader"></i>불러오는 중...</div></div>
  </div>

  <!-- 상세 -->
  <div class="view" id="view-detail">
    <div class="dv" id="detail-inner">
      <div class="dv-bar">
        <div class="back-btn" onclick="backToOverview()">
          <i class="ti ti-arrow-left"></i>취합 화면</div>
        <span style="color:var(--bd2);font-size:20px;margin:0 2px">/</span>
        <span class="crumb" id="d-crumb"><strong></strong></span>
        <div class="dv-bar-r">
          <div class="icon-btn" onclick="openAddEvent(curSite)" title="일정 추가">
            <i class="ti ti-calendar-plus"></i></div>
        </div>
      </div>
      
      <div id="gj-section"></div>
    </div>
  </div>

  <!-- 캘린더 -->
  <div class="view" id="view-cal">
    <div class="cal-hdr">
      <div class="cal-title">
        <div class="cal-nav" onclick="chgMonth(-1)"><i class="ti ti-chevron-left"></i></div>
        <span id="cal-lbl">2025년 6월</span>
        <div class="cal-nav" onclick="chgMonth(1)"><i class="ti ti-chevron-right"></i></div>
      </div>
      <div class="cal-right">
        <div class="cal-leg" id="cal-leg"></div>
        <div class="icon-btn" onclick="openManageEventTypes()" title="분류 항목 관리">
          <i class="ti ti-tags"></i></div>
      </div>
    </div>
    <div class="cal-body">
      <div class="cal-hint"><i class="ti ti-info-circle"></i>날짜를 클릭해 일정을 추가하고, 일정을 클릭해 수정할 수 있습니다.</div>
      <div class="cal-site-leg" id="cal-site-leg"></div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="ev-lhdr"><span id="ev-cnt"></span></div>
      <div class="ev-list" id="ev-list"></div>
    </div>
  </div>

  <div class="app-footer">
    <span id="footer-ver"></span>
  </div>
</div>

<!-- 사용자 패널 -->
<div class="up-overlay" id="up-overlay" style="display:none" onclick="if(event.target===this)closeUP()">
  <div class="up-box">
    <div class="up-hdr">
      <h3><i class="ti ti-users"></i>사용자 관리</h3>
      <div class="up-close" onclick="closeUP()"><i class="ti ti-x"></i></div>
    </div>
    <div class="up-body">
      <div class="up-sec">등록된 사용자</div>
      <div id="user-list"></div>
      <div class="up-sec" style="margin-top:6px">새 사용자 추가</div>
      <div class="up-form">
        <div class="up-grid">
          <div><label>아이디</label><input id="nu-id" placeholder="영문/숫자"></div>
          <div><label>비밀번호</label><input id="nu-pw" type="password" placeholder="초기 비밀번호"></div>
          <div><label>이름</label><input id="nu-name" placeholder="성명"></div>
          <div><label>권한</label>
            <select id="nu-role">
              <option value="admin">관리자</option>
              <option value="manager" selected>매니저</option>
              <option value="viewer">조회자</option>
            </select>
          </div>

  });
}

function calcWeek(baseDate){
  const d=new Date(baseDate);
  const yr=d.getFullYear();
  const jan1=new Date(yr,0,1);
  const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  const mon=new Date(d);mon.setDate(d.getDate()-d.getDay()+1); // 월요일
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);        // 금요일
  return{year:yr,week:wk,label:`${wk}주차`,
         from:mon.toISOString().slice(0,10),
         to:fri.toISOString().slice(0,10)};
}

// 공종 항목(카테고리) — 주차별 스냅샷 방식
// 데이터 구조: CATS_CACHE[site] = { "2025-W20": ["토목","건축",...], "2025-W25": [...] }
// 항목 변경 시 "현재 보고 있는 주차" 키로 새 스냅샷을 만들어 그 시점부터만 적용되고,
// 과거 주차는 그 시점 이전의 가장 최근 스냅샷을 그대로 사용해 변경 영향을 받지 않음.
let CATS_CACHE = null;

function defaultCatsDB(){
  const def={};
  const baseWk='1900-W01'; // 항상 가장 과거로 취급되는 기준 스냅샷 키
  SITES.forEach(s=>{ def[s]={[baseWk]:[...(CATS[SITE_TYPE[s]]||CATS['착공'])]}; });
  return def;
}

// 구버전(현장→배열) 데이터를 신버전(현장→{주차키:배열})으로 마이그레이션
function migrateCatsIfNeeded(val){
  const baseWk='1900-W01';
  const out={};
  SITES.forEach(s=>{
    const v=val[s];
    if(Array.isArray(v)){
      // 구버전 — 단일 배열이었던 경우 가장 과거 스냅샷으로 이전
      out[s]={[baseWk]:v};
    } else if(v && typeof v==='object'){
      out[s]=v;
    } else {
      out[s]={[baseWk]:[...(CATS[SITE_TYPE[s]]||CATS['착공'])]};
    }
  });
  return out;
}

async function loadCatsFromFirebase(){
  if(IS_DEMO){
    CATS_CACHE = defaultCatsDB();
    return;
  }
  try{
    const snap = await fbCatsRef().once('value');
    const val = snap.val();
    if(val){
      CATS_CACHE = migrateCatsIfNeeded(val);
    } else {
      CATS_CACHE = defaultCatsDB();
      await fbCatsRef().set(CATS_CACHE);
    }
  }catch(e){
    console.warn('카테고리 로드 실패, 기본값 사용', e);
    CATS_CACHE = defaultCatsDB();
  }
  if(!IS_DEMO){
    fbCatsRef().on('value', snap=>{
      const val=snap.val();
      if(val) CATS_CACHE = migrateCatsIfNeeded(val);
    });
  }
}

// 주차 키 비교 (예: "2025-W07" < "2025-W25") — 문자열 비교로 충분 (연도 4자리 + W + 2자리 패딩)
function wkKeyLte(a,b){ return a<=b; }

// 특정 현장의, "기준 주차 시점"에 유효했던 공종 목록을 반환
// 기준 주차 이하의 가장 최근 스냅샷을 사용 (이후 변경은 영향 없음)
function getCats(site,refWeekKey){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  const siteSnaps = CATS_CACHE[site];
  if(!siteSnaps || typeof siteSnaps!=='object'){
    const t=SITE_TYPE[site]; return CATS[t]||CATS['착공'];
  }
  const refKey = refWeekKey || wkKey();
  const keys = Object.keys(siteSnaps).sort(); // 문자열 정렬 = 시간 순
  let applicable = keys[0];
  for(const k of keys){
    if(wkKeyLte(k, refKey)) applicable = k;
    else break;
  }
  const list = siteSnaps[applicable];
  if(list && list.length) return list;
  const t=SITE_TYPE[site]; return CATS[t]||CATS['착공'];
}

async function persistCats(){
  if(IS_DEMO) return;
  try{ await fbCatsRef().set(CATS_CACHE); }
  catch(e){ toast('항목 저장 실패: '+e.message); }
}

// 항목 변경 시 "현재 주차"를 시작점으로 하는 새 스냅샷을 생성 (이전 주차는 영향 없음)
function ensureCurrentSnapshot(site){
  if(!CATS_CACHE) CATS_CACHE = defaultCatsDB();
  if(!CATS_CACHE[site]) CATS_CACHE[site]={};
  const curKey = wkKey();
  if(!CATS_CACHE[site][curKey]){
    // 현재 시점에 유효한 목록을 복제해서 새 스냅샷으로 만듦 (이 시점부터 독립적으로 변경됨)
    CATS_CACHE[site][curKey] = [...getCats(site, curKey)];
  }
  return curKey;
}

async function addCat(site,name){
  const curKey=ensureCurrentSnapshot(site);
  if(CATS_CACHE[site][curKey].includes(name)){ toast('이미 존재하는 항목입니다'); return false; }
  CATS_CACHE[site][curKey].push(name);
  await persistCats();
  return true;
}
async function renameCat(site,oldName,newName){
  const curKey=ensureCurrentSnapshot(site);
  const idx=CATS_CACHE[site][curKey].indexOf(oldName);
  if(idx<0) return false;
  if(CATS_CACHE[site][curKey].includes(newName)&&newName!==oldName){ toast('이미 존재하는 이름입니다'); return false; }
  CATS_CACHE[site][curKey][idx]=newName;
  await persistCats();
  return true;
}
async function deleteCat(site,name){
  const curKey=ensureCurrentSnapshot(site);
  if(CATS_CACHE[site][curKey].length<=1){ toast('최소 1개 항목은 있어야 합니다'); return false; }
  CATS_CACHE[site][curKey]=CATS_CACHE[site][curKey].filter(c=>c!==name);
  await persistCats();
  return true;
}

async function reorderCat(site,fromIdx,toIdx){
  const curKey=ensureCurrentSnapshot(site);
  const arr=CATS_CACHE[site][curKey];
  const [item]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,item);
  await persistCats();
}

function fbSiteRef(site,year){

}
function fbCalRef(){
  return fbDB.ref(`${FB_ROOT}/calendar`);
}
function fbEventTypesRef(){

}
function fbCatsRef(){
  return fbDB.ref(`${FB_ROOT}/categories`);
}

// 현장별 실시간 리스너 등록 (다른 사용자의 저장이 즉시 반영됨)
const fbListeners = {};
function attachRealtimeListener(site,year,onChange){
  const key=site+'__'+year;
  if(fbListeners[key])return;
  const ref=fbSiteRef(site,year);
  ref.on('value', snap=>{
    const val=snap.val();
    if(val) onChange(val);
  });
  fbListeners[key]=ref;
}

async function fetchSiteData(site){
  const wk=wkKey();
  if(IS_DEMO){
    if(!dataCache[site+'__'+wk])dataCache[site+'__'+wk]=buildInitData(site);
    return dataCache[site+'__'+wk];
  }
  const ck=site+'__'+wk;
  if(dataCache[ck])return dataCache[ck];
  try{
    const snap=await fbSiteRef(site,WEEK.year).child(wk).once('value');
    const val=snap.val();
    const wd=val||buildInitData(site);
    dataCache[ck]=wd;
    return wd;
  }catch(e){console.warn(site,e);return buildInitData(site);}
}

async function saveSiteData(site,patch){
  const wk=wkKey();
  const ck=site+'__'+wk;
  if(IS_DEMO){
    dataCache[ck]={...(dataCache[ck]||buildInitData(site)),...patch,updated_at:new Date().toISOString()};
    return true;
  }
  try{
    const newData={
      ...(dataCache[ck]||buildInitData(site)),
      ...patch,
      updated_by:curUser?.name||'',
      updated_at:new Date().toISOString()
    };
    await fbSiteRef(site,WEEK.year).child(wk).set(newData);
    dataCache[ck]=newData;
    return true;
  }catch(e){
    toast('저장 오류: '+e.message);
    return false;
  }
}

function stripFirstHeading(html){
  return html.replace(/^\s*<h[1-6][^>]*>.*?<\/h[1-6]>\s*/,'');
}

  const cats=getCats(site);

function initTabDragDrop(site, cats){
  const container=document.getElementById('gj-tabs');
  if(!container) return;
  let dragSrc=null, dragSrcIdx=-1;

  container.querySelectorAll('.gj-tab[draggable="true"]').forEach(tab=>{
    tab.addEventListener('dragstart',e=>{
      dragSrc=tab;
      dragSrcIdx=parseInt(tab.dataset.idx);
      tab.classList.add('gj-tab-dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', dragSrcIdx);
    });
    tab.addEventListener('dragend',()=>{
      tab.classList.remove('gj-tab-dragging');
      container.querySelectorAll('.gj-tab').forEach(t=>t.classList.remove('gj-tab-drag-over'));
    });
    tab.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(tab!==dragSrc){
        container.querySelectorAll('.gj-tab').forEach(t=>t.classList.remove('gj-tab-drag-over'));
        tab.classList.add('gj-tab-drag-over');
      }
    });
    tab.addEventListener('dragleave',()=>{
      tab.classList.remove('gj-tab-drag-over');
    });
    tab.addEventListener('drop',async e=>{
      e.preventDefault();
      tab.classList.remove('gj-tab-drag-over');
      const toIdx=parseInt(tab.dataset.idx);
      if(dragSrcIdx===toIdx || isNaN(dragSrcIdx) || isNaN(toIdx)) return;
      const movedCatName=dragSrc?.dataset?.gj||curGJ; // 드래그한 공종명 기억 → 드롭 후 선택 유지
      await reorderCat(site, dragSrcIdx, toIdx);
      const data=await fetchSiteData(site);
      curGJ=movedCatName; // 드래그한 공종이 이동 후에도 선택 상태 유지
      await renderGJSection(site, getCats(site), data);
      toast('순서가 변경되었습니다');
    });
  });

function openCatAdd(site){

function openCatEdit(site,catName){

async function confirmDeleteCat(site,catName){
  if(!confirm(`'${catName}' 항목을 삭제하시겠습니까?\n작성된 내용도 함께 삭제됩니다.`))return;
  const ok=await deleteCat(site,catName);
  if(!ok){ return; }
  closeModal();
  const data=await fetchSiteData(site);
  if(data.gongjong)delete data.gongjong[catName];
  const newCats=getCats(site);
  if(curGJ===catName)curGJ=newCats[0];
  await renderGJSection(site,newCats,data);
  await saveSiteData(site,{gongjong:data.gongjong});

}

function stripFirstHeading2(md){
  // 마크다운 원문에서 첫 줄이 ### 또는 #### 제목이면 그 줄만 제거 (내용은 보존)
  const lines=md.split('\n');
  if(lines.length && /^#{1,4}\s/.test(lines[0].trim())){
    lines.shift();
    while(lines.length && lines[0].trim()==='') lines.shift();
  }
  return lines.join('\n');
}

// execCommand 래퍼
function ceExec(w,cmd,val){
  focusCE(w);
  if(cmd==='formatBlock'){
    setHeading(w,val);
    return;
  }
  document.execCommand(cmd,false,val||null);
  updateWStat();
}

// formatBlock의 브라우저별 비일관성을 회피하기 위해 직접 DOM으로 블록 태그를 적용
function setHeading(w,tag){
  const ce=document.getElementById('ce-'+w);
  if(!ce)return;
  focusCE(w);
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  let node=sel.getRangeAt(0).startContainer;
  // 현재 블록 요소(가장 가까운 블록 레벨 부모) 찾기
  const blockTags=['P','H1','H2','H3','H4','DIV','LI','BLOCKQUOTE'];
  while(node && node!==ce && !(node.nodeType===1 && blockTags.includes(node.nodeName))){
    node=node.parentNode;
  }
  if(!node || node===ce){
    // 블록이 없으면 현재 선택 위치에 새 헤딩 생성
    const newEl=document.createElement(tag);
    newEl.innerHTML=sel.toString()||'\u200b';
    const r=sel.getRangeAt(0);
    r.deleteContents();
    r.insertNode(newEl);
    placeCaretAtEnd(newEl);
  } else if(node.nodeName==='LI'){
    // 목록 항목은 그대로 두고 텍스트만 변환 대상에서 제외 (목록 구조 보존)
    return;
  } else {
    // 기존 블록을 새 태그로 교체 (내용 보존)
    const newEl=document.createElement(tag);
    newEl.innerHTML=node.innerHTML;
    node.replaceWith(newEl);
    placeCaretAtEnd(newEl);
  }
  updateWStat();
}

function placeCaretAtEnd(el){
  const range=document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function focusCE(w){
  const ce=document.getElementById('ce-'+w);
  if(ce&&document.activeElement!==ce)ce.focus();
}

function insertBadge(w,cls,txt){
  focusCE(w);
  const span=document.createElement('span');
  span.className=cls; span.textContent=txt;
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const r=sel.getRangeAt(0);
    r.deleteContents();
    r.insertNode(span);
    const sp=document.createTextNode('\u00a0');
    span.after(sp);
    r.setStartAfter(sp); r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
  }
  updateWStat();
}

function insertCheckItem(w){
  focusCE(w);
  const ce=document.getElementById('ce-'+w);
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  const r=sel.getRangeAt(0);
  const li=document.createElement('li');
  const cb=document.createElement('input');
  cb.type='checkbox'; cb.disabled=false;
  cb.addEventListener('change',updateWStat);
  li.appendChild(cb);
  li.appendChild(document.createTextNode('\u00a0'));
  let ul=null;
  // 기존 ul 안에 있으면 그냥 삽입
  let node=r.startContainer;
  while(node&&node!==ce){if(node.nodeName==='UL'){ul=node;break;}node=node.parentNode;}
  if(ul){
    const newLi=li.cloneNode(true);
    newLi.querySelector('input[type=checkbox]').addEventListener('change',updateWStat);
    ul.appendChild(newLi);
    r.setStart(newLi,newLi.childNodes.length); r.collapse(true);
  } else {
    const newUl=document.createElement('ul');
    newUl.appendChild(li);
    r.deleteContents(); r.insertNode(newUl);
    r.setStart(li,li.childNodes.length); r.collapse(true);
  }
  sel.removeAllRanges(); sel.addRange(r);
  updateWStat();
}

function insertHR(w){
  focusCE(w);
  document.execCommand('insertHTML',false,'<hr><p><br></p>');
  updateWStat();
}

function copyFromCur(){

async function copyFromPrevWeek(){
  const ceCur=document.getElementById('ce-cur');
  if(!ceCur)return;
  if(IS_DEMO){ toast('데모 모드에서는 전주 데이터를 불러올 수 없습니다'); return; }
  const btn=document.getElementById('copy-prev-btn');
  if(btn){ btn.style.pointerEvents='none'; btn.innerHTML='<i class="ti ti-loader"></i> 불러오는 중...'; }
  try{
    const prevWk=prevWeekInfo();
    const prevData=await fetchSiteDataForWeek(curSite,prevWk);
    const prevNextMd=prevData?.gongjong?.[curGJ]?.next_md;
    if(!prevNextMd || !prevNextMd.trim()){
      toast(`전주(${prevWk.label}) 차주 예정사항에 작성된 내용이 없습니다`);
      return;
    }
    if(ceCur.innerHTML.trim() && !confirm('금주 진행사항에 이미 작성된 내용이 있습니다.\n전주 차주 예정사항 내용으로 덮어쓸까요?')) return;
    const cleanMd=stripFirstHeading2(prevNextMd);
    ceCur.innerHTML = cleanMd.trim() ? marked.parse(cleanMd) : '';
    ceCur.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.disabled=false;
      cb.addEventListener('change',()=>updateWStat());
    });
    updateWStat();
    toast(`전주(${prevWk.label}) 차주 예정사항 내용을 가져왔습니다`);
  }catch(e){
    toast('전주 내용 불러오기 실패: '+e.message);
  }finally{
    if(btn){ btn.style.pointerEvents=''; btn.innerHTML='<i class="ti ti-arrow-down-circle"></i>전주 내용 가져오기'; }
  }
}

function insertTable(w){
  focusCE(w);
  const tbl=`<table><thead><tr><th>항목</th><th>내용</th><th>비고</th></tr></thead><tbody><tr><td></td><td></td><td></td></tr></tbody></table><p><br></p>`;
  document.execCommand('insertHTML',false,tbl);
  updateWStat();
}

function updateWStat(){
  const ce1=document.getElementById('ce-cur');
  const ce2=document.getElementById('ce-nxt');
  if(!ce1)return;
  const blocks=(ce1.querySelectorAll('h3,h4,p,li,blockquote').length)+
               (ce2?ce2.querySelectorAll('h3,h4,p,li,blockquote').length:0);
  const el=document.getElementById('ws-stat');
  if(el)el.innerHTML=`<i class="ti ti-align-left"></i>${blocks}블록`;
  const sv=document.getElementById('ws-save');
  if(sv){sv.innerHTML='<i class="ti ti-pencil"></i> 편집 중';sv.style.color='var(--amber)';}
}

// / 슬래시 명령어
function onCEInput(ce){
  updateWStat();
  const w=ce.dataset.which;
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return;
  const node=sel.focusNode;
  const txt=node?.textContent||'';
  const si=txt.lastIndexOf('/');
  if(si>=0&&txt.slice(si)==='/'){
    showSlash(w,ce);
  } else {
    closeSlash(w);
  }
}

function onCEKey(e,ce){
  const w=ce.dataset.which;
  const sp=document.getElementById('sp-'+w);
  if(sp&&sp.style.display==='block'){
    if(e.key==='ArrowDown'){e.preventDefault();moveSlash(w,1);}
    else if(e.key==='ArrowUp'){e.preventDefault();moveSlash(w,-1);}
    else if(e.key==='Enter'){e.preventDefault();selectSlash(w);}
    else if(e.key==='Escape'){closeSlash(w);}
    return;
  }
  // Tab → 들여쓰기
  if(e.key==='Tab'){e.preventDefault();document.execCommand(e.shiftKey?'outdent':'indent');}
}

function showSlash(w,ce){
  const sp=document.getElementById('sp-'+w);
  if(!sp)return;
  // 플랫 명령 목록
  slashPop.allCmds=SLASH_CMDS.flatMap(g=>g.cmds);
  slashPop.sel=0; slashPop.which=w;
  // 위치
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const rect=sel.getRangeAt(0).getBoundingClientRect();
    const ceRect=ce.getBoundingClientRect();
    sp.style.top=(rect.bottom-ceRect.top+4)+'px';
    sp.style.left=Math.max(0,rect.left-ceRect.left)+'px';
  }
  sp.innerHTML=SLASH_CMDS.map((g,gi)=>
    `<div class="slash-cat">${g.cat}</div>`+
    g.cmds.map((c,ci)=>{
      const idx=SLASH_CMDS.slice(0,gi).reduce((s,x)=>s+x.cmds.length,0)+ci;
      return`<div class="si${idx===0?' sel':''}" data-idx="${idx}" onclick="runSlash('${w}',${idx})">
        <i class="ti ${c.icon}"></i>${c.label}</div>`;
    }).join('')
  ).join('');
  sp.style.display='block';
}

function closeSlash(w){
  const sp=document.getElementById('sp-'+w);
  if(sp)sp.style.display='none';
}

function moveSlash(w,dir){
  const n=slashPop.allCmds.length;
  slashPop.sel=(slashPop.sel+dir+n)%n;
  document.querySelectorAll(`#sp-${w} .si`).forEach((el,i)=>el.classList.toggle('sel',i===slashPop.sel));
}

function selectSlash(w){
  runSlash(w,slashPop.sel);
}

function runSlash(w,idx){
  closeSlash(w);
  // / 문자 삭제
  const ce=document.getElementById('ce-'+w);
  if(ce){
    const sel=window.getSelection();
    if(sel&&sel.rangeCount){
      const r=sel.getRangeAt(0);
      const node=r.startContainer;
      if(node.nodeType===3){
        const txt=node.textContent;
        const si=txt.lastIndexOf('/');
        if(si>=0)node.textContent=txt.slice(0,si);
        r.setStart(node,si>=0?si:r.startOffset); r.collapse(true);
        sel.removeAllRanges(); sel.addRange(r);
      }
    }
  }
  const cmd=slashPop.allCmds[idx];
  if(cmd)cmd.fn(w);
}

async function renderCal(){
  if(!calEventsLoaded) await loadCalEventsFromFirebase();
  const y=calYear,m=calMonth;
  document.getElementById('cal-lbl').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const byDay={};
  calEvents.forEach(e=>{
    const ed=new Date(e.date+'T00:00:00');
    if(ed.getFullYear()===y && ed.getMonth()===m){
      const d=ed.getDate();
      if(!byDay[d])byDay[d]=[];
      byDay[d].push(e);
    }
  });
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const prev=new Date(y,m,0).getDate();
  for(let i=first-1;i>=0;i--)html+=`<div class="cal-cell other"><div class="cal-dn">${prev-i}</div></div>`;
  for(let d=1;d<=days;d++){
    const dow=(first+d-1)%7;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const evs=byDay[d]||[];
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evH=evs.slice(0,2).map(e=>{
      const st=siteEvStyle(e.site_code);
      const labeled=evTitleWithSite(e);
      return`<div class="cal-ev" style="background:${st.bg};color:${st.fg};border-left:3px solid ${st.dot}" title="${labeled}" onclick="event.stopPropagation();openEditEvent('${e.id}')">${labeled}</div>`;
    }).join('');
    const more=evs.length>2?`<div class="ev-more" onclick="event.stopPropagation();openDayEvents('${dateStr}')">+${evs.length-2}건</div>`:'';
    html+=`<div class="cal-cell${isT?' today':''}" onclick="openAddEvent(null,'${dateStr}')"><div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>${evH}${more}</div>`;
  }
  const rem=7-((first+days)%7||7);
  for(let i=1;i<=rem&&rem<7;i++)html+=`<div class="cal-cell other"><div class="cal-dn">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;

  const monthEvents=calEvents.filter(e=>{
    const ed=new Date(e.date+'T00:00:00');
    return ed.getFullYear()===y && ed.getMonth()===m;
  });
  const sorted=[...monthEvents].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('ev-cnt').textContent=`${y}년 ${m+1}월 전체 일정 (${sorted.length}건)`;
  document.getElementById('ev-list').innerHTML=sorted.map(e=>{
    const t=evTypeStyle(e.event_type);
    const st=siteEvStyle(e.site_code);
    const dd=e.date.slice(5).replace('-','.');
    return`<div class="ev-item" onclick="openEditEvent('${e.id}')" style="cursor:pointer;border-left:3px solid ${st.dot}">
      <div class="ev-dot" style="background:${t.dot}" title="${e.event_type}"></div>
      <div class="ev-date">${dd}</div>
      <div class="ev-type" style="background:${t.bg};color:${t.fg}">${e.event_type}</div>
      <div class="ev-title"><span class="ev-site-tag" style="color:${st.fg}">(${e.site_code})</span> ${e.title}</div>
      <div class="ev-del" onclick="event.stopPropagation();delEvent('${e.id}')"><i class="ti ti-x"></i></div>
    </div>`;
  }).join('');
  renderLegend();
}

    leg.innerHTML=types.map(t=>`<div class="leg"><div class="leg-dot" style="background:${t.dot}"></div>${t.key}</div>`).join('');

function hexToBg(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r+(255-r)*0.88), lg=Math.round(g+(255-g)*0.88), lb=Math.round(b+(255-b)*0.88);
  return `rgb(${lr},${lg},${lb})`;
}
function hexToFg(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const dr=Math.round(r*0.55), dg=Math.round(g*0.55), db=Math.round(b*0.55);
  return `rgb(${dr},${dg},${db})`;
}

      </div>
    </div>`;
  document.getElementById('ms-btn').onclick=async()=>{
    try{const ok=await onSave();if(ok!==false)closeModal();}
    catch(e){toast('오류: '+e.message);}
  };
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
</script>
