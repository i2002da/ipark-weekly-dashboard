<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>천안IPC 주간업무현황 v2.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
:root{
  --bg:#F5F4F0;--bg2:#fff;--bg3:#EEECEA;
  --bd:#E0DED8;--bd2:#CECCCA;
  --tx:#1C1C1A;--tx2:#5A5955;--tx3:#99978F;
  --blue:#1A5FA8;--blue-bg:#EAF1FB;--blue-tx:#0B3F7A;
  --green:#3A6E12;--green-bg:#EBF3DE;--green-tx:#254A09;
  --amber:#8A5009;--amber-bg:#FBF0DC;--amber-tx:#5E3504;
  --red:#A82B2B;--red-bg:#FCEAEA;--red-tx:#7A1C1C;
  --purple:#4E45B0;--purple-bg:#EEEDFE;--purple-tx:#332E84;
  --teal:#0C6B52;--teal-bg:#E0F4EE;--teal-tx:#084835;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
     background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6}

/* ═══ 로그인 화면 ═══ */
.login-screen{position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:900}
.login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:32px 36px;width:420px;max-width:95vw}
.login-logo{font-size:11px;color:var(--tx3);font-weight:600;letter-spacing:.05em;margin-bottom:4px}
.login-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px;letter-spacing:-.02em}
.login-sub{font-size:12px;color:var(--tx2);margin-bottom:24px}
.login-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:20px;gap:0}
.login-tab{font-size:12px;padding:7px 14px;cursor:pointer;color:var(--tx3);
  border-bottom:2px solid transparent;font-weight:500}
.login-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.form-input{width:100%;padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--r);
  font-size:13px;color:var(--tx);background:var(--bg2);transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.login-btn:hover{background:var(--blue-tx)}
.login-btn:disabled{opacity:.6;cursor:default}
.login-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px}
.login-demo{font-size:11px;color:var(--blue);margin-top:12px;text-align:center;cursor:pointer}
.login-demo:hover{text-decoration:underline}
.ver-badge{font-size:10px;color:var(--tx3);text-align:center;margin-top:16px}

/* ═══ 앱 ═══ */
#app{display:none}

/* 상단바 */
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:0;
  position:sticky;top:0;z-index:200}
.tb-brand{display:flex;flex-direction:column;padding-right:14px;
  border-right:1px solid var(--bd);margin-right:6px}
.tb-brand .co{font-size:10px;color:var(--tx3)}
.tb-brand .nm{font-size:13px;font-weight:700;color:var(--tx)}
.tb-link{font-size:12px;color:var(--tx2);padding:0 12px;height:50px;
  display:flex;align-items:center;gap:5px;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tb-link i{font-size:14px}
.tb-link.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tb-link:hover:not(.active){background:var(--bg3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.week-nav{display:flex;align-items:center;gap:4px}
.wn-btn{width:24px;height:24px;border:1px solid var(--bd);border-radius:6px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--tx2);background:var(--bg2)}
.wn-btn:hover{background:var(--bg3)}
.wn-btn i{font-size:12px}
.wn-lbl{font-size:11px;font-weight:600;color:var(--tx);background:var(--bg3);
  border:1px solid var(--bd);border-radius:6px;padding:3px 10px;min-width:78px;text-align:center}
.user-chip{font-size:11px;background:var(--blue-bg);color:var(--blue-tx);
  border-radius:99px;padding:4px 11px;display:flex;align-items:center;gap:4px;font-weight:600}
.icon-btn{width:28px;height:28px;border:1px solid var(--bd);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--tx2);background:var(--bg2);transition:all .15s}
.icon-btn:hover{background:var(--bg3)}
.icon-btn i{font-size:14px}
.ver-chip{font-size:10px;color:var(--tx3);background:var(--bg3);
  border:1px solid var(--bd);border-radius:99px;padding:2px 8px}

/* 서브바 */
.subbar{height:42px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:5px;
  position:sticky;top:50px;z-index:199;overflow-x:auto}
.sb-lbl{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;margin-right:2px;flex-shrink:0}
.chip{font-size:11px;padding:4px 11px;border-radius:99px;border:1px solid var(--bd);
  background:var(--bg2);color:var(--tx2);cursor:pointer;transition:all .15s;
  font-weight:500;white-space:nowrap;flex-shrink:0}
.chip.on-all{background:var(--tx);color:var(--bg2);border-color:transparent}
.chip.on-3,.chip.on-4{background:var(--amber-bg);color:var(--amber-tx);border-color:transparent}
.chip.on-5,.chip.on-6{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.chip.on-inf{background:var(--teal-bg);color:var(--teal-tx);border-color:transparent}
.chip.on-dx{background:var(--purple-bg);color:var(--purple-tx);border-color:transparent}

/* 뷰 */
.view{display:none}.view.active{display:flex;flex-direction:column}

/* 롤업 */
.rollup{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:8px}
.site-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.site-head{display:flex;align-items:center;gap:10px;padding:11px 16px;
  cursor:pointer;transition:background .12s}
.site-head:hover,.site-head.exp{background:var(--bg3)}
.s-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0}
.t-blue{background:var(--blue-bg);color:var(--blue-tx)}
.t-amber{background:var(--amber-bg);color:var(--amber-tx)}
.t-teal{background:var(--teal-bg);color:var(--teal-tx)}
.t-purple{background:var(--purple-bg);color:var(--purple-tx)}
.s-name{font-size:14px;font-weight:700;color:var(--tx);min-width:58px}
.s-type{font-size:11px;color:var(--tx3)}
.s-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.prog-bar{width:70px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.prog-pct{font-size:11px;color:var(--tx2);min-width:36px;text-align:right;font-weight:600}
.s-status{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.st-ok{background:var(--green-bg);color:var(--green-tx)}
.st-warn{background:var(--amber-bg);color:var(--amber-tx)}
.st-red{background:var(--red-bg);color:var(--red-tx)}
.open-btn{width:26px;height:26px;border:1px solid var(--bd);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:var(--tx2);background:var(--bg2);transition:all .15s;flex-shrink:0}
.open-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.open-btn i{font-size:13px}
.inline-body{display:none;border-top:1px solid var(--bd)}
.inline-body.open{display:grid;grid-template-columns:1fr 1fr}
.icol{padding:12px 16px;border-right:1px solid var(--bd)}
.icol:last-child{border-right:none}
.icol-hd{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.icol-hd i{font-size:12px}
.tl{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.tld{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d-done{background:#3A6E12}.d-prog{background:#1A5FA8}
.d-plan{background:#8A5009}.d-warn{background:#A82B2B}
.tlt{font-size:11px;color:var(--tx2);line-height:1.45;flex:1}
.tlt.done{color:var(--tx3);text-decoration:line-through}
.tlm{font-size:10px;color:var(--tx3);white-space:nowrap}
.more-link{font-size:11px;color:var(--blue);margin-top:5px;cursor:pointer;
  display:inline-flex;align-items:center;gap:3px}

/* 상세 뷰 */
.dv{height:calc(100vh - 92px);overflow:hidden;display:flex;flex-direction:column}
.dv-bar{height:46px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:8px;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:4px;font-size:12px;
  color:var(--tx2);cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.back-btn:hover{background:var(--bg3)}
.back-btn i{font-size:14px}
.crumb{font-size:12px;color:var(--tx3)}
.crumb strong{color:var(--tx);font-weight:700}
.dv-bar-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.seg{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.seg-b{font-size:11px;padding:5px 10px;background:var(--bg2);color:var(--tx2);
  cursor:pointer;border-right:1px solid var(--bd);transition:all .15s}
.seg-b:last-child{border-right:none}
.seg-b.on{background:var(--bg3);font-weight:700;color:var(--tx)}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  padding:12px 20px;border-bottom:1px solid var(--bd);
  background:var(--bg3);flex-shrink:0}
.kpi-c{background:var(--bg2);border-radius:var(--r);padding:10px 12px;border:1px solid var(--bd)}
.kpi-l{font-size:10px;color:var(--tx3);margin-bottom:2px;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em}
.kpi-v{font-size:20px;font-weight:700;color:var(--tx);letter-spacing:-.02em}
.kpi-s{font-size:10px;color:var(--tx2);margin-top:2px}
.gj-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg2);
  flex-shrink:0;overflow-x:auto;padding:0 20px;gap:0}
.gj-tab{font-size:12px;padding:9px 13px;cursor:pointer;color:var(--tx2);
  border-bottom:2px solid transparent;white-space:nowrap;
  display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.gj-tab i{font-size:13px}
.gj-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.gj-tab:hover:not(.active){background:var(--bg3)}
.gj-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* MD 에디터 */
.md-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;border-top:1px solid var(--bd)}
.md-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.md-pane:first-child{border-right:1px solid var(--bd)}
.md-pane-hd{display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;border-bottom:1px solid var(--bd);
  background:var(--bg3);flex-shrink:0}
.md-pane-title{font-size:11px;font-weight:700;color:var(--tx2);
  display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.04em}
.md-pane-title i{font-size:13px}
.md-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
.mdb-this{background:var(--blue-bg);color:var(--blue-tx)}
.mdb-next{background:var(--green-bg);color:var(--green-tx)}
.md-tb{display:flex;align-items:center;gap:2px;padding:4px 10px;
  border-bottom:1px solid var(--bd);background:var(--bg2);flex-wrap:wrap;flex-shrink:0}
.tbt{min-width:26px;height:26px;border:1px solid var(--bd);border-radius:5px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:11px;font-weight:700;color:var(--tx2);background:var(--bg2);
  padding:0 4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tbt:hover{background:var(--bg3);color:var(--tx);border-color:var(--bd2)}
.tsep{width:1px;height:16px;background:var(--bd);margin:0 2px;flex-shrink:0}
.tlbl{font-size:10px;color:var(--tx3);padding:0 2px;white-space:nowrap}
.md-ta{flex:1;width:100%;border:none;outline:none;resize:none;
  font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.75;
  color:var(--tx);background:var(--bg2);padding:12px 14px;overflow-y:auto}
.md-prev{flex:1;overflow-y:auto;padding:12px 14px}

/* MD 렌더 */
.mdr{font-size:12px;line-height:1.75;color:var(--tx2)}
.mdr h3{font-size:13px;font-weight:700;color:var(--tx);margin:12px 0 5px;
  padding-bottom:4px;border-bottom:1px solid var(--bd)}
.mdr h3:first-child{margin-top:0}
.mdr h4{font-size:12px;font-weight:700;color:var(--tx);margin:9px 0 3px}
.mdr ul{margin:3px 0 3px 14px}
.mdr li{margin-bottom:3px;line-height:1.55}
.mdr li input[type=checkbox]{margin-right:5px;accent-color:var(--blue)}
.mdr strong{font-weight:700;color:var(--tx)}
.mdr code{font-family:'SF Mono','Fira Code',monospace;font-size:10px;
  background:var(--bg3);padding:1px 5px;border-radius:4px;border:1px solid var(--bd)}
.mdr blockquote{border-left:3px solid var(--bd2);padding:4px 10px;
  color:var(--tx3);margin:5px 0;background:var(--bg3);border-radius:0 4px 4px 0;font-size:11px}
.mdr p{margin-bottom:4px}
.mdr table{width:100%;border-collapse:collapse;font-size:11px;margin:5px 0}
.mdr th{background:var(--bg3);padding:4px 8px;border:1px solid var(--bd);
  font-weight:700;color:var(--tx);text-align:left}
.mdr td{padding:4px 8px;border:1px solid var(--bd);color:var(--tx2)}
.mdr hr{border:none;border-top:1px solid var(--bd);margin:8px 0}
.mdr .bd{background:var(--green-bg);color:var(--green-tx);font-size:10px;
  padding:1px 6px;border-radius:99px;font-family:inherit;border:none}
.mdr .bp{background:var(--blue-bg);color:var(--blue-tx);font-size:10px;
  padding:1px 6px;border-radius:99px;font-family:inherit;border:none}
.mdr .by{background:var(--amber-bg);color:var(--amber-tx);font-size:10px;
  padding:1px 6px;border-radius:99px;font-family:inherit;border:none}
.mdr .bw{background:var(--red-bg);color:var(--red-tx);font-size:10px;
  padding:1px 6px;border-radius:99px;font-family:inherit;border:none}

/* 상태바 */
.md-sbar{height:30px;background:var(--bg3);border-top:1px solid var(--bd);
  display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0}
.st-item{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:3px}
.st-item i{font-size:11px}
.save-area{margin-left:auto;display:flex;align-items:center;gap:6px}
.save-btn{font-size:11px;padding:4px 12px;border:1px solid var(--bd2);border-radius:var(--r);
  cursor:pointer;background:var(--bg2);color:var(--tx2);
  display:flex;align-items:center;gap:4px;font-weight:600;transition:all .15s}
.save-btn:hover{background:var(--blue);color:#fff;border-color:transparent}
.save-btn.saving{background:var(--blue-bg);color:var(--blue-tx);
  border-color:transparent;pointer-events:none}
.save-btn.saved{background:var(--green-bg);color:var(--green-tx);border-color:transparent}

/* 캘린더 */
.cal-hdr{height:46px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.cal-title{font-size:14px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px}
.cal-nav{width:28px;height:28px;border:1px solid var(--bd);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.cal-nav:hover{background:var(--bg3)}
.cal-nav i{font-size:13px}
.cal-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.cal-leg{display:flex;align-items:center;gap:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.add-ev-btn{font-size:11px;padding:5px 11px;border:1px solid var(--bd2);
  border-radius:var(--r);background:var(--bg2);color:var(--tx2);cursor:pointer;
  display:flex;align-items:center;gap:4px;font-weight:500;transition:all .15s}
.add-ev-btn:hover{background:var(--blue-bg);color:var(--blue-tx);border-color:transparent}
.add-ev-btn i{font-size:13px}
.cal-body{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;
  background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cal-dow{background:var(--bg3);text-align:center;font-size:10px;font-weight:700;
  color:var(--tx3);padding:7px 0;letter-spacing:.04em}
.cal-dow.sun{color:var(--red)}.cal-dow.sat{color:var(--blue)}
.cal-cell{background:var(--bg2);min-height:76px;padding:5px 6px;cursor:pointer}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.today{background:var(--blue-bg)}
.cal-cell.other .cal-dn{opacity:.3}
.cal-dn{font-size:11px;font-weight:600;color:var(--tx);margin-bottom:3px}
.cal-dn.sun{color:var(--red)}.cal-dn.sat{color:var(--blue)}
.cal-ev{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5}
.ev-ext{background:var(--red-bg);color:var(--red-tx)}
.ev-int{background:var(--blue-bg);color:var(--blue-tx)}
.ev-dx{background:var(--purple-bg);color:var(--purple-tx)}
.ev-site{background:var(--teal-bg);color:var(--teal-tx)}
.ev-more{font-size:10px;color:var(--tx3);padding:1px 5px}
.ev-lhdr{display:flex;align-items:center;justify-content:space-between}
.ev-lhdr span{font-size:13px;font-weight:700;color:var(--tx)}
.ev-list{display:flex;flex-direction:column;gap:5px}
.ev-item{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border:1px solid var(--bd);border-radius:var(--r);background:var(--bg2)}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ev-date{font-size:11px;color:var(--tx3);width:40px;flex-shrink:0;font-weight:600}
.ev-type{font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;font-weight:600}
.ev-title{font-size:12px;color:var(--tx);flex:1;font-weight:500}
.ev-site-lbl{font-size:10px;color:var(--tx3)}
.ev-del{width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--tx3);border-radius:3px}
.ev-del:hover{color:var(--red)}.ev-del i{font-size:12px}

/* 사용자 관리 패널 */
.user-panel{position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;z-index:600}
.up-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  width:520px;max-width:95vw;max-height:85vh;overflow:hidden;
  display:flex;flex-direction:column}
.up-hdr{display:flex;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--bd);background:var(--bg3)}
.up-hdr h3{font-size:15px;font-weight:700;color:var(--tx);flex:1;

.u-btn.del:hover{background:var(--red-bg);color:var(--red);border-color:transparent}

.add-user-form .form-row-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.add-user-form .form-row-full{margin-bottom:10px}
.add-user-form label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:3px}
.add-user-form input,.add-user-form select{width:100%;padding:7px 10px;
  border:1px solid var(--bd2);border-radius:var(--r);
  font-size:12px;color:var(--tx);background:var(--bg2)}
.add-user-form input:focus,.add-user-form select:focus{outline:none;border-color:var(--blue)}
.add-user-btn{font-size:12px;padding:7px 16px;background:var(--blue);color:#fff;
  border:none;border-radius:var(--r);cursor:pointer;font-weight:700}
.pw-change-form{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.pw-change-form label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:3px}
.pw-change-form input{width:100%;padding:7px 10px;border:1px solid var(--bd2);
  border-radius:var(--r);font-size:12px;color:var(--tx);background:var(--bg2);margin-bottom:8px}
.pw-change-form input:focus{outline:none;border-color:var(--blue)}
.pw-save-btn{font-size:12px;padding:7px 16px;background:var(--green);color:#fff;
  border:none;border-radius:var(--r);cursor:pointer;font-weight:700}

/* 모달 */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bd);
  padding:22px;width:380px}
.modal h4{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:16px;
  display:flex;align-items:center;gap:7px}
.modal h4 i{font-size:17px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;font-size:12px;padding:7px 10px;
  border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx)}
.fr input:focus,.fr select:focus{outline:none;border-color:var(--blue)}
.fr textarea{resize:vertical;min-height:64px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-c{font-size:12px;padding:6px 14px;border:1px solid var(--bd2);
  border-radius:var(--r);background:var(--bg2);color:var(--tx2);cursor:pointer}
.btn-s{font-size:12px;padding:6px 16px;border:none;border-radius:var(--r);
  background:var(--blue);color:#fff;cursor:pointer;font-weight:700}
.btn-s:hover{background:var(--blue-tx)}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--tx);color:var(--bg2);font-size:12px;padding:9px 20px;
  border-radius:99px;z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;font-weight:600;white-space:nowrap}

  padding:48px;color:var(--tx3);font-size:13px;gap:8px}
.loading i{font-size:18px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<body>

<script>
// ══════════════════════════════════════════════════════════════
// 버전 정보
// ══════════════════════════════════════════════════════════════
const VER = { ver:'v2.1', date:'2025-06-11', time:'20:30' };
const VER_STR = `${VER.ver}  ${VER.date} ${VER.time}`;
document.querySelectorAll('#login-ver,#top-ver').forEach(el=>{
  if(el.id==='login-ver') el.textContent = `버전 ${VER_STR}`;
  else el.textContent = VER_STR;
});

// ══════════════════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════════════════
const SITES = ['3단지','4단지','5단지','6단지','기반시설','DX TFT'];
const SITE_TYPE = {
  '3단지':'착공예정','4단지':'착공예정',
  '5단지':'착공','6단지':'착공',
  '기반시설':'기반시설','DX TFT':'DX TFT'
};
const CATS = {
  '착공':     ['토목','건축','전기','설비','조경','공무','RM'],
  '착공예정': ['건축허가','환경·교통','인허가협의','설계검토','기타'],
  '기반시설': ['토목','전기','통신','조경','공무'],
  'DX TFT':  ['현장 DX 적용','본사 유관팀 협의','DX 교육·과제']
};
const GJ_COLOR = {
  토목:'#3D5A78',건축:'#1A5FA8',전기:'#8A5009',설비:'#0C6B52',
  조경:'#3A6E12',공무:'#4E45B0',RM:'#9B2E5C',
  건축허가:'#1A5FA8','환경·교통':'#0C6B52',인허가협의:'#4E45B0',
  설계검토:'#8A5009',기타:'#3D5A78',
  전기:'#8A5009',통신:'#4E45B0',
  '현장 DX 적용':'#1A5FA8','본사 유관팀 협의':'#4E45B0','DX 교육·과제':'#3A6E12'
};
const PROG_COL = {
  착공:'#1A5FA8',착공예정:'#8A5009',기반시설:'#0C6B52','DX TFT':'#4E45B0'
};
const GIST_IDS = {"3단지":"1d873b30d956aff42560010401348a8a","4단지":"d123cf6feb701976c1906686a4a111f3","5단지":"f9735f876219765ded71310c4bc8d852","6단지":"8cbe6dc83d2485d9a7d5ce623d11188f","기반시설":"98cf3995d7fd2394eaad920502f04ec3","DX TFT":"85a2181b2f1a01cce5624a18d641fb2f"};

// ══════════════════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════════════════
let GIST_TOKEN = '';
let IS_DEMO    = false;
let curUser    = null;   // { id, name, role, site }
let curSite    = '';
let curGJ      = '';
let edMode     = 'split';
let calYear    = 2025, calMonth = 5;
let calEvents  = [];
let dataCache  = {};
let etagCache  = {};
let WEEK = { year:2025, week:25, label:'25주차',
             from:'2025-06-16', to:'2025-06-20' };

// ── 사용자 DB (localStorage 기반) ─────────────────────────────
function getUserDB() {
  try {
    const raw = localStorage.getItem('ipark_users');
    if (raw) return JSON.parse(raw);
  } catch(e){}
  // 기본 관리자 계정
  const defaults = [
    { id:'admin',    pw:btoa('admin1234'),  name:'관리자',  role:'admin',   site:'' },
    { id:'manager1', pw:btoa('pass1234'),   name:'현장관리', role:'manager', site:'' },
    { id:'viewer1',  pw:btoa('view1234'),   name:'조회자',  role:'viewer',  site:'' }
  ];
  localStorage.setItem('ipark_users', JSON.stringify(defaults));
  return defaults;
}
function saveUserDB(users) {
  localStorage.setItem('ipark_users', JSON.stringify(users));
}

// ══════════════════════════════════════════════════════════════
// marked.js 커스텀 렌더러
// ══════════════════════════════════════════════════════════════
const rdr = new marked.Renderer();
const _cs = rdr.codespan.bind(rdr);
rdr.codespan = (c) => {
  if(c==='완료') return '<span class="bd">완료</span>';
  if(c==='진행') return '<span class="bp">진행</span>';
  if(c==='예정') return '<span class="by">예정</span>';
  if(c==='지적'||c==='대기') return '<span class="bw">'+c+'</span>';
  return _cs(c);
};
marked.use({ renderer:rdr, breaks:true, gfm:true });

// ══════════════════════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════════════════════
function toast(msg,ms=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}
function fd(d){
  if(!d)return''; const dt=new Date(d);
  return `${dt.getMonth()+1}.${dt.getDate()}`;
}
function wkKey(){ return `${WEEK.year}-W${String(WEEK.week).padStart(2,'0')}`; }
function safeSite(s){ return s.replace(/ /g,'_').replace(/·/g,'_'); }
function gistFile(site,yr){ return `ipark_${safeSite(site)}_${yr}.json`; }
function getCats(site){
  const t=SITE_TYPE[site]; return CATS[t]||CATS['착공'];
}

// ══════════════════════════════════════════════════════════════
// 로그인 탭 전환
// ══════════════════════════════════════════════════════════════
function switchLoginTab(tab){
  document.getElementById('ltab-login').classList.toggle('on', tab==='login');

async function doTokenLogin(){

(function restoreSession(){
  const s = localStorage.getItem('ipark_session');
  if(!s) return;
  try{
    const { id, ts } = JSON.parse(s);
    if(Date.now()-ts > 8*3600*1000){ localStorage.removeItem('ipark_session'); return; }
    if(id==='token_user'){
      const tok = localStorage.getItem('ipark_gist_token');
      if(!tok) return;
      GIST_TOKEN=tok; IS_DEMO=false;
      curUser={id:'token_user',name:tok.slice(0,12)+'...',role:'manager',site:''};
      startApp(); return;
    }
    const users=getUserDB();
    const u=users.find(x=>x.id===id);
    if(!u) return;
    curUser=u;
    GIST_TOKEN=localStorage.getItem('ipark_gist_token')||'';
    IS_DEMO=!GIST_TOKEN;
    if(IS_DEMO) initDemoData();
    startApp();
  }catch(e){}
})();

// Gist API
// ══════════════════════════════════════════════════════════════
async function gistGet(gistId){
  const r=await fetch('https://api.github.com/gists/'+gistId,{
    headers:{ Authorization:'token '+GIST_TOKEN,
              Accept:'application/vnd.github+json' }
  });
  if(!r.ok) throw new Error('GET '+r.status);
  const etag=r.headers.get('ETag')||'';
  return { data:await r.json(), etag };
}

async function gistPatch(gistId, files, etag){
  const hdrs={ Authorization:'token '+GIST_TOKEN,
               Accept:'application/vnd.github+json',
               'Content-Type':'application/json' };
  if(etag) hdrs['If-Match']=etag;
  const r=await fetch('https://api.github.com/gists/'+gistId,{
    method:'PATCH', headers:hdrs,
    body:JSON.stringify({files})
  });
  if(r.status===412) throw new Error('CONFLICT');
  if(!r.ok) throw new Error('PATCH '+r.status);
  return r.headers.get('ETag')||'';
}

async function fetchSiteData(site){
  const wk=wkKey();
  if(IS_DEMO){
    if(!dataCache[site]) dataCache[site]={};
    if(!dataCache[site][wk]) dataCache[site][wk]=buildInitData(site);
    return dataCache[site][wk];
  }
  const gid=GIST_IDS[site];
  if(!gid) return buildInitData(site);
  const cacheKey=site+'__'+wk;
  if(dataCache[cacheKey]) return dataCache[cacheKey];
  try{
    const {data,etag}=await gistGet(gid);
    etagCache[site]=etag;
    const fname=gistFile(site,WEEK.year);
    const content=data.files[fname]?.content;
    if(!content) return buildInitData(site);
    const yearData=JSON.parse(content);
    const wkData=yearData[wk]||buildInitData(site);
    dataCache[cacheKey]=wkData;
    return wkData;
  }catch(e){ console.warn('fetchSiteData',site,e); return buildInitData(site); }
}

async function saveSiteData(site, patch){
  if(IS_DEMO){
    const wk=wkKey(); const ck=site+'__'+wk;
    dataCache[ck]={...(dataCache[ck]||buildInitData(site)),...patch,
                   updated_at:new Date().toISOString()};
    return true;
  }
  const gid=GIST_IDS[site];
  if(!gid){ toast('Gist ID 없음'); return false; }
  try{
    const {data,etag}=await gistGet(gid);
    const fname=gistFile(site,WEEK.year);
    let yearData={};
    try{ yearData=JSON.parse(data.files[fname]?.content||'{}'); }catch(e){}
    const wk=wkKey();
    yearData[wk]={...(yearData[wk]||buildInitData(site)),...patch,
                  updated_by:curUser?.name||'',
                  updated_at:new Date().toISOString()};
    const newEtag=await gistPatch(gid,{[fname]:{content:JSON.stringify(yearData,null,2)}},etag);
    etagCache[site]=newEtag;
    dataCache[site+'__'+wk]=yearData[wk];
    return true;
  }catch(e){
    if(e.message==='CONFLICT'){
      toast('⚠️ 저장 충돌 — 다른 사람이 먼저 저장했습니다. 새로고침 후 재시도하세요.');
    } else {
      toast('저장 오류: '+e.message);
    }
    return false;
  }
}

function chgWeek(dir){
  const d=new Date(WEEK.from); d.setDate(d.getDate()+dir*7);
  const yr=d.getFullYear();
  const jan1=new Date(yr,0,1);
  const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  WEEK={year:yr,week:wk,label:`${wk}주차`,
        from:mon.toISOString().slice(0,10),
        to:fri.toISOString().slice(0,10)};
  dataCache={}; etagCache={};
  document.getElementById('wn-lbl').textContent=WEEK.label;
  loadRollup();
  if(curSite) openDetail(curSite);
}

const SITE_TAGS={'착공':'t-blue','착공예정':'t-amber','기반시설':'t-teal','DX TFT':'t-purple'};

async function loadRollup(){
  const div=document.getElementById('rollup');
  div.innerHTML='<div class="loading"><i class="ti ti-loader"></i>불러오는 중...</div>';
  const rows=[];
  for(const s of SITES) rows.push({site:s,data:await fetchSiteData(s)});
  renderRollup(rows);
}

function renderRollup(rows){
  const div=document.getElementById('rollup');
  div.innerHTML=rows.map(({site,data})=>{
    const t=SITE_TYPE[site];
    const pct=data.progress||0;
    const col=PROG_COL[t]||'#1A5FA8';
    const sc=data.status==='정상'?'st-ok':data.status==='지연'?'st-red':'st-warn';
    const cats=getCats(site);
    // 인라인 미리보기
    const prevItems=cats.slice(0,3).map(c=>{
      const md=data.gongjong?.[c]?.current_md||'';
      const line=md.split('\n').find(l=>l.trim().startsWith('- '));
      if(!line) return null;
      const txt=line.replace(/^-\s*\[.\]\s*/,'').replace(/`[^`]+`\s*/g,'').trim();
      const done=line.includes('[x]');
      const warn=line.includes('`지적`')||line.includes('`대기`');
      const st=done?'done':warn?'warn':line.includes('`진행`')?'prog':'plan';
      return{c,txt,st};
    }).filter(Boolean);
    const prevH=prevItems.length
      ?prevItems.map(p=>`<div class="tl"><span class="tld d-${p.st}"></span>
        <span class="tlt ${p.st==='done'?'done':''}">${p.c}: ${p.txt.slice(0,28)}${p.txt.length>28?'…':''}</span></div>`).join('')
      :'<div style="font-size:11px;color:var(--tx3)">항목 없음</div>';
    // 공종 진행률
    const gjH=cats.slice(0,5).map(c=>{
      const md=data.gongjong?.[c]?.current_md||'';
      const items=md.split('\n').filter(l=>l.trim().startsWith('- '));
      const done=items.filter(l=>l.includes('[x]')).length;
      return`<div class="tl"><span class="tld d-${done>0&&done===items.length?'done':'prog'}"></span>
        <span class="tlt">${c} (${done}/${items.length})</span></div>`;
    }).join('');
    const sk=site.replace(/\s/g,'_');
    return`<div class="site-card" data-site="${site}" id="sc-${sk}">
      <div class="site-head" onclick="toggleInline('${sk}')">
        <span class="s-tag ${SITE_TAGS[t]||'t-blue'}">${t}</span>
        <span class="s-name">${site}</span>
        <span class="s-type">${t!=='DX TFT'&&t!=='기반시설'?'아이파크시티':''}</span>
        <div class="s-right">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
          <span class="prog-pct">${t==='착공예정'?'인허가':pct+'%'}</span>
          <span class="s-status ${sc}">${data.status||'정상'}</span>
          <div class="open-btn" onclick="event.stopPropagation();openDetail('${site}')" title="상세 보기">
            <i class="ti ti-layout-sidebar-right-expand"></i></div>
        </div>
      </div>
      <div class="inline-body" id="ib-${sk}">
        <div class="icol">
          <div class="icol-hd"><i class="ti ti-hammer"></i>금주 요약</div>
          ${prevH}
          <div class="more-link" onclick="openDetail('${site}')">
            <i class="ti ti-arrow-right"></i>상세 편집</div>
        </div>
        <div class="icol">
          <div class="icol-hd"><i class="ti ti-checklist"></i>공종 현황</div>
          ${gjH}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleInline(sk){
  const ib=document.getElementById('ib-'+sk);
  const hd=document.querySelector('#sc-'+sk+' .site-head');
  if(!ib) return;
  const open=ib.classList.toggle('open');
  if(hd) hd.classList.toggle('exp',open);

function filterSite(chip,site){

             '6단지':'on-6','기반시설':'on-inf','DX TFT':'on-dx'};

async function openDetail(site){
  curSite=site;
  document.getElementById('d-crumb').innerHTML=`<strong>${site}</strong>`;
  showView('detail',null);
  document.querySelectorAll('.tb-link').forEach(l=>l.classList.remove('active'));
  document.getElementById('kpi-row').innerHTML=
    '<div class="loading"><i class="ti ti-loader"></i></div>';
  const data=await fetchSiteData(site);
  const cats=getCats(site);
  // KPI
  const allMD=cats.flatMap(c=>data.gongjong?.[c]?.current_md?.split('\n')
    .filter(l=>l.trim().startsWith('- '))||[]);
  const done=allMD.filter(l=>l.includes('[x]')).length;
  const prog=allMD.filter(l=>l.includes('`진행`')).length;
  const warn=allMD.filter(l=>l.includes('`지적`')||l.includes('`대기`')).length;
  document.getElementById('kpi-row').innerHTML=[
    {l:'공정률',v:SITE_TYPE[site]==='착공예정'?'인허가':(data.progress||0)+'%',s:'이번 주'},
    {l:'완료',v:done+'건',s:`전체 ${allMD.length}건`},
    {l:'진행 중',v:prog+'건',s:'공종 전체'},
    {l:'요주의',v:warn+'건',s:'지적·대기'},
    {l:'주차',v:WEEK.label,s:`${fd(WEEK.from)}–${fd(WEEK.to)}`}
  ].map(k=>`<div class="kpi-c"><div class="kpi-l">${k.l}</div>
    <div class="kpi-v">${k.v}</div><div class="kpi-s">${k.s}</div></div>`).join('');
  if(!curGJ||!cats.includes(curGJ)) curGJ=cats[0];
  renderGJSection(site,cats,data);
}

function renderGJSection(site,cats,data){
  const sec=document.getElementById('gj-section');
  const tabH=`<div class="gj-tabs" id="gj-tabs">`+cats.map(c=>{
    const md=data.gongjong?.[c]?.current_md||'';
    const items=md.split('\n').filter(l=>l.trim().startsWith('- '));
    const done=items.filter(l=>l.includes('[x]')).length;
    const col=GJ_COLOR[c]||'var(--blue)';
    const hasW=md.includes('`지적`')||md.includes('`대기`');
    return`<div class="gj-tab${c===curGJ?' active':''}" onclick="switchGJ('${c}')" data-gj="${c}">
      <div class="gj-dot" style="background:${col}"></div>
      ${c}<span style="font-size:10px;color:${hasW?'var(--red)':'var(--tx3)'}">·${done}/${items.length}</span>
    </div>`;

  sec.innerHTML=tabH+`<div id="gj-ed-wrap" style="height:calc(100vh - 92px - 46px - 80px - 42px);display:flex;flex-direction:column;overflow:hidden"></div>`;
  renderEditor(site,curGJ,data);
}

function switchGJ(c){
  curGJ=c;

function esc(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function syncPrev(w){
  const ta=document.getElementById('md-'+w);
  const rnd=document.getElementById('rnd-'+w);
  if(!ta||!rnd) return;
  rnd.innerHTML=marked.parse(ta.value);
  rnd.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.disabled=true);
  const lines=ta.value.split('\n').length;
  const el=document.getElementById('st-lines');
  if(el) el.textContent=lines+'줄';
  const sv=document.getElementById('st-save');
  if(sv){ sv.innerHTML='<i class="ti ti-pencil"></i> 편집 중'; sv.style.color='var(--amber)'; }
}

function ins(w,b,a){
  const ta=document.getElementById('md-'+w); if(!ta) return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);
  ta.selectionStart=s+b.length; ta.selectionEnd=s+b.length+sel.length;
  ta.focus(); syncPrev(w);
}
function insL(w,pfx){
  const ta=document.getElementById('md-'+w); if(!ta) return;
  const pos=ta.selectionStart;
  const bol=ta.value.lastIndexOf('\n',pos-1)+1;
  ta.value=ta.value.slice(0,bol)+pfx+ta.value.slice(bol);
  ta.selectionStart=ta.selectionEnd=bol+pfx.length+(pos-bol);
  ta.focus(); syncPrev(w);
}

function setEdMode(m){
  edMode=m;
  ['split','edit','prev'].forEach(x=>{
    document.getElementById('seg-'+x)?.classList.toggle('on',x===m);
  });
  applyEdLayout();
}

function applyEdLayout(){
  const cta=document.getElementById('md-cur');
  const nta=document.getElementById('md-nxt');
  const cp=document.getElementById('prev-cur');
  const np=document.getElementById('prev-nxt');
  if(!cta) return;
  if(edMode==='split'){
    [cta,cp,nta,np].forEach(el=>{ if(el){el.style.display='';el.style.flex='1';}});
    if(cp) cp.style.borderLeft='1px solid var(--bd)';
    if(np) np.style.borderLeft='1px solid var(--bd)';
  } else if(edMode==='edit'){
    cta.style.display=''; cta.style.flex='1';
    nta.style.display=''; nta.style.flex='1';
    if(cp) cp.style.display='none';
    if(np) np.style.display='none';
  } else {
    if(cta) cta.style.display='none';
    if(nta) nta.style.display='none';
    if(cp){ cp.style.display='';cp.style.flex='1';cp.style.borderLeft='none';}
    if(np){ np.style.display='';np.style.flex='1';np.style.borderLeft='none';}
  }
}

}

async function renderCal(){
  if(!IS_DEMO) await loadCalEvents();
  const y=calYear,m=calMonth;
  document.getElementById('cal-lbl').textContent=`${y}년 ${m+1}월`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const byDay={};
  calEvents.forEach(e=>{
    const d=parseInt(e.date.split('-')[2]);
    if(!byDay[d]) byDay[d]=[];
    byDay[d].push(e);
  });
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map((d,i)=>`<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const prev=new Date(y,m,0).getDate();
  for(let i=first-1;i>=0;i--) html+=`<div class="cal-cell other"><div class="cal-dn">${prev-i}</div></div>`;
  for(let d=1;d<=days;d++){
    const dow=(first+d-1)%7;
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const evs=byDay[d]||[];
    const evH=evs.slice(0,2).map(e=>`<div class="cal-ev ev-${e.event_type==='대외'?'ext':e.event_type==='대내'?'int':e.event_type==='DX'?'dx':'site'}" title="${e.title}">${e.title}</div>`).join('');
    const more=evs.length>2?`<div class="ev-more">+${evs.length-2}건</div>`:'';
    html+=`<div class="cal-cell${isT?' today':''}"><div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>${evH}${more}</div>`;
  }
  const rem=7-((first+days)%7||7);
  for(let i=1;i<=rem&&rem<7;i++) html+=`<div class="cal-cell other"><div class="cal-dn">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html;
  const sorted=[...calEvents].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('ev-cnt-lbl').textContent=`${y}년 ${m+1}월 전체 일정 (${sorted.length}건)`;
  const TS={대외:{dot:'#A82B2B',bg:'var(--red-bg)',fg:'var(--red-tx)'},
            대내:{dot:'#1A5FA8',bg:'var(--blue-bg)',fg:'var(--blue-tx)'},
            DX:{dot:'#4E45B0',bg:'var(--purple-bg)',fg:'var(--purple-tx)'},
            공정:{dot:'#0C6B52',bg:'var(--teal-bg)',fg:'var(--teal-tx)'}};
  document.getElementById('ev-list').innerHTML=sorted.map(e=>{
    const t=TS[e.event_type]||TS['대내'];
    const dd=e.date.slice(5).replace('-','.');
    return`<div class="ev-item">
      <div class="ev-dot" style="background:${t.dot}"></div>
      <div class="ev-date">${dd}</div>
      <div class="ev-type" style="background:${t.bg};color:${t.fg}">${e.event_type}</div>
      <div class="ev-title">${e.title}</div>
      <div class="ev-site-lbl">${e.site_code}</div>
      <div class="ev-del" onclick="delEvent(${e.id})"><i class="ti ti-x"></i></div>
    </div>`;
  }).join('');
}
function chgMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
function delEvent(id){
  if(!confirm('일정을 삭제할까요?')) return;
  calEvents=calEvents.filter(e=>e.id!==id);
  renderCal(); toast('삭제 완료');
}
function openAddEvent(site){
  const sites=['통합',...SITES];
  const td=new Date().toISOString().slice(0,10);
  showModal(`<h4><i class="ti ti-calendar-plus"></i>일정 추가</h4>
    <div class="fr"><label>날짜</label><input type="date" id="m-dt" value="${td}"></div>
    <div class="fr"><label>구분</label><select id="m-tp"><option>대외</option><option>대내</option><option>DX</option><option>공정</option></select></div>
    <div class="fr"><label>현장</label><select id="m-st">${sites.map(s=>`<option${s===site?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="fr"><label>일정 내용</label><input type="text" id="m-tt" placeholder="예: 발주처 공정회의"></div>`,
    ()=>{
      const title=document.getElementById('m-tt').value.trim();
      if(!title){toast('내용 입력 필요');return false;}
      calEvents.push({id:Date.now(),date:document.getElementById('m-dt').value,
        event_type:document.getElementById('m-tp').value,title,
        site_code:document.getElementById('m-st').value});
      renderCal(); toast('일정 추가 완료');
    });
}

// ══════════════════════════════════════════════════════════════
// 모달
// ══════════════════════════════════════════════════════════════
function showModal(inner,onSave){
  document.getElementById('modal-root').innerHTML=
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">${inner}
        <div class="modal-btns">
          <button class="btn-c" onclick="closeModal()">취소</button>
          <button class="btn-s" id="ms-btn">저장</button>
        </div>
      </div>
    </div>`;
  document.getElementById('ms-btn').onclick=async()=>{
    try{const ok=await onSave();if(ok!==false)closeModal();}
    catch(e){toast('오류: '+e.message);}
  };
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
</script>
